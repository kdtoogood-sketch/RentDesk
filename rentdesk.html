<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RentDesk — KDC Infra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --bg:#F5F6FA;--white:#FFFFFF;--orange:#F97316;--orange2:#EA6A0A;
  --orange-dim:rgba(249,115,22,0.08);--orange-mid:rgba(249,115,22,0.15);
  --ink:#1A1A1A;--ink2:#555555;--muted:#9CA3AF;--border:#E8ECF0;
  --red:#EF4444;--red-dim:rgba(239,68,68,0.1);
  --green:#10B981;--green-dim:rgba(16,185,129,0.1);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.1);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,0.1);
  --purple:#8B5CF6;--purple-dim:rgba(139,92,246,0.1);
  --shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-md:0 4px 24px rgba(0,0,0,0.1);--r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:'Inter',sans-serif;}
button{cursor:pointer;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:20px;z-index:9999;}
.login-wrap{width:100%;max-width:380px;}
.login-logo{margin-bottom:32px;text-align:center;}
.login-brand-small{font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.login-brand{font-family:'Space Grotesk';font-size:32px;font-weight:700;color:#fff;}
.login-brand span{color:var(--orange);}
.login-card{background:#fff;border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,0.4);padding:32px;}
.login-title{font-family:'Space Grotesk';font-size:18px;font-weight:700;margin-bottom:4px;color:#1A1A1A;}
.login-desc{font-size:13px;color:#666;margin-bottom:24px;}
.fl{margin-bottom:16px;}
.fl label{display:block;font-size:11px;font-weight:600;color:var(--ink2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.fi{width:100%;padding:11px 14px;background:#F8F9FA;border:1.5px solid #DDE1E7;border-radius:8px;color:#1A1A1A;font-size:14px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--orange);background:#fff;}
.fi::placeholder{color:#AAA;}
.login-btn{width:100%;padding:13px;background:var(--orange);border:none;border-radius:8px;font-family:'Space Grotesk';font-size:15px;font-weight:700;color:#fff;transition:all .2s;}
.login-btn:hover{background:var(--orange2);}
.login-err{color:#DC2626;font-size:12px;margin-top:10px;display:none;padding:10px 12px;background:#FEE2E2;border-radius:6px;}
.login-hint{margin-top:14px;font-size:12px;color:#888;text-align:center;}
.login-hint strong{color:#555;}

/* SHELL */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden;}
.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.topbar-left{display:flex;align-items:center;gap:6px;}
.tb-brand{font-family:'Space Grotesk';font-size:17px;font-weight:700;color:var(--ink);}
.tb-brand span{color:var(--orange);}
.tb-co{font-size:10px;color:var(--muted);letter-spacing:.5px;}
.tb-sep{color:var(--border);font-size:16px;padding:0 4px;}
.tb-crumb{font-size:12px;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tb-user{font-size:12px;color:var(--ink2);padding:5px 12px;background:var(--bg);border-radius:20px;border:1px solid var(--border);}
.tb-role{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
.tb-role.admin{background:var(--orange-dim);color:var(--orange);}
.tb-role.staff{background:var(--blue-dim);color:var(--blue);}
.tb-logout{width:32px;height:32px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.tb-logout:hover{border-color:var(--red);color:var(--red);}
.tabs{display:none;} /* hidden - replaced by bottom nav */
.content{flex:1;overflow-y:auto;padding:18px;padding-bottom:230px;} /* bottom padding for nav */

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  display:flex;flex-wrap:wrap;
  height:220px;z-index:100;
  box-shadow:0 -2px 12px rgba(0,0,0,0.08);
}
.bn-row-divider{display:none;}
.bn-item{
  width:33.3333%;height:55px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;background:none;border:none;
  border-bottom:1px solid var(--border);
  transition:all .2s;color:var(--muted);
}
.bn-item:nth-child(n+7){border-bottom:none;}
.bn-item.active{color:var(--orange);background:var(--orange-dim);}
.bn-item:hover{color:var(--ink2);}
.bn-icon{font-size:20px;line-height:1;}
.bn-label{font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.bn-item.active .bn-icon{transform:scale(1.1);}

/* LEASE OVERLAY */
#leaseOverlay{position:fixed;inset:0;background:#0008;z-index:300;display:none;flex-direction:column;overflow:hidden;}
#leaseOverlay.open{display:flex;}
.lo-head{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;box-shadow:var(--shadow);}
.lo-title{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px;}
.lo-actions{display:flex;gap:8px;align-items:center;}
.lo-body{flex:1;display:flex;overflow:hidden;}
.lo-form{width:380px;flex-shrink:0;overflow-y:auto;padding:16px;background:var(--bg);border-right:1px solid var(--border);}
.lo-preview{flex:1;overflow-y:auto;padding:24px 32px;background:#fff;}
@media(max-width:800px){
  .lo-body{flex-direction:column;}
  .lo-form{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:50vh;}
  .lo-preview{padding:16px;}
}
.deed-wrap{font-family:'Times New Roman',Times,serif;font-size:14px;line-height:1.75;color:#111;max-width:680px;margin:0 auto;}
.deed-wrap h2{font-size:15px;font-weight:700;text-align:center;text-decoration:underline;letter-spacing:1.5px;margin-bottom:18px;}
.deed-wrap p{text-align:justify;margin-bottom:10px;}
.deed-wrap ol{margin:0;padding-left:0;list-style:none;}
.deed-wrap ol li{margin-bottom:8px;padding-left:0;}
.deed-cl{font-weight:700;text-decoration:underline;font-size:12.5px;}
.deed-pg{page-break-before:always;padding-top:24px;}
.deed-sig{display:flex;justify-content:space-between;margin-top:32px;gap:24px;}
.deed-sig-blk{flex:1;text-align:center;border-top:1px solid #333;padding-top:8px;font-size:12px;}
.deed-wit{display:flex;gap:40px;margin-bottom:28px;}
.deed-wit-blk{flex:1;border-top:1px solid #333;padding-top:6px;font-size:12px;}
.renewal-banner{background:#EFF6FF;border:1.5px solid var(--blue);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--blue);font-weight:600;}
/* stamp-space: hidden on screen, appears in print CSS */
.stamp-space{display:none;}
.stamp-file{display:block;margin-bottom:18px;}
.stamp-file img,.stamp-file embed{max-width:100%;max-height:220px;display:block;margin:0 auto;object-fit:contain;}
.stamp-file-name{font-size:11px;color:var(--muted);margin-top:6px;word-break:break-word;}
.lease-status-active{background:var(--green-dim);color:var(--green);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.lease-status-expired{background:var(--red-dim);color:var(--red);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.lease-status-renewed{background:#F3F4F6;color:var(--muted);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.quick-room-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.quick-room-row:last-child{border-bottom:none;}

@media print{
  @page{
    size:A4 portrait;
    margin:10mm 18mm 15mm 18mm;
    @bottom-center{
      content:"Page " counter(page) " of " counter(pages);
      font-family:"Times New Roman",Times,serif;
      font-size:9pt;
      color:#555;
    }
  }
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body > *:not(#printZone){display:none !important;}
  #printZone{
    display:block !important;
    position:static !important;
    padding:0;
    background:#fff;
    overflow:visible !important;
  }
  #printZone .deed-wrap{
    font-family:'Times New Roman',Times,serif !important;
    font-size:16px !important;
    line-height:1.7 !important;
    color:#111 !important;
    max-width:700px !important;
    margin:0 auto !important;
    text-align:justify !important;
  }
  #printZone .deed-wrap h2{
    font-size:18px !important;
    letter-spacing:1px !important;
    margin-bottom:16px !important;
    text-align:center !important;
  }
  #printZone .deed-wrap p{margin-bottom:11px !important;text-align:justify !important;}
  #printZone .deed-wrap ol li{margin-bottom:9px !important;text-align:justify !important;}
  #printZone .deed-sig{margin-top:36px !important;}
  #printZone .deed-wit-label{margin-top:50px !important;display:block !important;}
  #printZone .deed-wit{margin-top:60px !important;margin-bottom:24px !important;}
  #printZone .deed-wit-blk{min-height:90px !important;padding-bottom:40px !important;}
  #printZone .deed-pg{page-break-before:auto !important;break-before:auto !important;padding-top:0 !important;}
  #printZone .deed-final{page-break-before:auto !important;break-before:auto !important;margin-top:10px !important;page-break-inside:avoid !important;break-inside:avoid !important;}
  #printZone .stamp-space{width:100%;}
  #printZone .stamp-space-on{display:block !important;height:18mm !important;}
  #printZone .stamp-space-off{display:none !important;height:0 !important;}
  #printZone .stamp-file{display:block !important;page-break-inside:avoid !important;break-inside:avoid !important;margin-bottom:8mm !important;}
  #printZone .stamp-file img,#printZone .stamp-file embed{max-width:100% !important;max-height:252mm !important;display:block !important;margin:0 auto !important;object-fit:contain !important;}
}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Space Grotesk';font-weight:600;font-size:14px;color:var(--ink);}
.card-body{padding:18px;}

/* STATS */
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);}
.stat-icon{font-size:20px;margin-bottom:6px;}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.stat-value{font-family:'Space Grotesk';font-size:26px;font-weight:700;line-height:1;}
.stat-value.ora{color:var(--orange);}
.stat-value.grn{color:var(--green);}
.stat-value.red{color:var(--red);}
.stat-value.blu{color:var(--blue);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;border:none;transition:all .2s;cursor:pointer;letter-spacing:.2px;white-space:nowrap;}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:var(--orange2);}
.btn-ghost{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(249,115,22,0.2);}
.btn-ghost:hover{background:var(--orange-mid);}
.btn-red{background:var(--red-dim);color:var(--red);}
.btn-red:hover{background:rgba(239,68,68,0.18);}
.btn-green{background:var(--green-dim);color:var(--green);}
.btn-green:hover{background:rgba(16,185,129,0.18);}
.btn-blue{background:var(--blue-dim);color:var(--blue);}
.btn-blue:hover{background:rgba(59,130,246,0.18);}
.btn-amber{background:var(--amber-dim);color:var(--amber);}
.btn-amber:hover{background:rgba(245,158,11,0.18);}
.btn-purple{background:var(--purple-dim);color:var(--purple);}
.btn-purple:hover{background:rgba(139,92,246,0.18);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-xs{padding:4px 9px;font-size:10px;border-radius:6px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px;}
.badge-grn{background:var(--green-dim);color:var(--green);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-ora{background:var(--orange-dim);color:var(--orange);}
.badge-blu{background:var(--blue-dim);color:var(--blue);}
.badge-grey{background:#F3F4F6;color:var(--muted);}
.badge-amb{background:var(--amber-dim);color:var(--amber);}
.badge-pur{background:var(--purple-dim);color:var(--purple);}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);background:#F9FAFB;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--ink2);}
.tbl td strong{color:var(--ink);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#FAFAFA;}

/* FORMS */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.frow1{margin-bottom:12px;}
.flabel{display:block;font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;}
.finput,.fselect,.ftextarea{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--ink);font-size:13px;outline:none;transition:border-color .2s;}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--orange);background:var(--white);}
.finput::placeholder{color:var(--muted);}
.ftextarea{resize:vertical;min-height:70px;}
.fhint{font-size:11px;color:var(--muted);margin-top:4px;}
.fsec{font-family:'Space Grotesk';font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:580px;margin:auto;transform:translateY(16px);transition:transform .2s;box-shadow:0 20px 60px rgba(0,0,0,0.12);}
.overlay.open .modal{transform:translateY(0);}
.modal-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink);}
.modal-x{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:2px;line-height:1;transition:color .2s;}
.modal-x:hover{color:var(--red);}
.modal-body{padding:20px;max-height:72vh;overflow-y:auto;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* PROPERTY + ROOM CARDS */
.prop-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.prop-card:hover{border-color:rgba(249,115,22,0.4);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.prop-card-head{background:linear-gradient(135deg,var(--orange),#FB923C);padding:16px 18px;}
.prop-card-name{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#fff;}
.prop-card-addr{font-size:11px;color:rgba(255,255,255,0.8);margin-top:3px;}
.prop-card-body{padding:14px 18px;}
.prop-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.prop-stat:last-child{border-bottom:none;}
.prop-stat-label{font-size:11px;color:var(--muted);}
.prop-stat-value{font-size:13px;font-weight:600;color:var(--ink);}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.room-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.room-card:hover{border-color:var(--orange);box-shadow:0 4px 16px rgba(249,115,22,0.12);}
.room-type{font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--ink);margin-bottom:2px;}
.room-rent{font-size:13px;color:var(--orange);font-weight:600;margin-bottom:6px;}
.room-tenant{font-size:12px;color:var(--ink2);}

/* ELEC CALC */
.ecalc{background:#FFF7ED;border:1.5px solid var(--orange);border-radius:var(--r);padding:14px;margin:10px 0;display:none;}
.ecalc.show{display:block;}
.ecalc-title{font-family:'Space Grotesk';font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.ecalc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(249,115,22,0.1);font-size:13px;}
.ecalc-row:last-child{border-bottom:none;}
.ecalc-row span:first-child{color:var(--muted);}
.ecalc-row span:last-child{font-weight:600;color:var(--ink);}
.ecalc-total{background:var(--orange);color:#fff;padding:10px 14px;border-radius:8px;display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-top:8px;}

/* MISC */
.cov-bar{background:#F3F4F6;border-radius:20px;height:7px;overflow:hidden;margin-top:6px;}
.cov-fill{height:100%;border-radius:20px;transition:width .6s ease;}
.cov-fill.ok{background:var(--green);}
.cov-fill.warn{background:var(--amber);}
.cov-fill.bad{background:var(--red);}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.irow:last-child{border-bottom:none;}
.irow-label{color:var(--muted);font-size:12px;}
.irow-value{color:var(--ink);font-weight:500;}
.back{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--orange);cursor:pointer;background:var(--orange-dim);border:1px solid rgba(249,115,22,0.2);border-radius:8px;margin-bottom:14px;}
.back:hover{opacity:.7;}
.status-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);}
.mnav{display:flex;align-items:center;gap:8px;}
.mnav button{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--ink2);transition:all .2s;cursor:pointer;}
.mnav button:hover{border-color:var(--orange);color:var(--orange);}
.mnav span{font-family:'Space Grotesk';font-weight:600;font-size:13px;color:var(--ink);min-width:130px;text-align:center;}
.empty{text-align:center;padding:48px 20px;}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.3;}
.empty-text{font-size:14px;color:var(--muted);margin-bottom:14px;}

<script>
// Global error handler - catches any JS crash
window.onerror=function(msg,src,line,col,err){
  const el=document.getElementById('loginScreen');
  if(el){
    const errDiv=document.createElement('div');
    errDiv.style.cssText='position:fixed;top:0;left:0;right:0;background:#EF4444;color:#fff;padding:10px;font-size:12px;z-index:9999;word-break:break-all;';
    errDiv.textContent='JS Error: '+msg+' (line '+line+')';
    document.body.appendChild(errDiv);
  }
  return false;
};
const FB_KEY='AIzaSyBiBmFAJHTxoZAddAON94u7FQ_d-RpX2io';
const FB_URL=`https://firestore.googleapis.com/v1/projects/propdesk-f50e0/databases/(default)/documents/rentdesk/main?key=${FB_KEY}`;
const DOCS_BASE=`https://firestore.googleapis.com/v1/projects/propdesk-f50e0/databases/(default)/documents/rentdesk_docs`;
const ADMIN='280190',STAFF='admin123';
const DOC_TYPES=[
  {key:'lease_deed',label:'Lease Deed / Agreement',icon:'📋',required:true},
  {key:'aadhaar',label:'Aadhaar Card',icon:'🪪',required:true},
  {key:'pan',label:'PAN Card',icon:'💳',required:true},
  {key:'office_id',label:'Office / Employment ID',icon:'🏢',required:false},
  {key:'police_ver',label:'Police Verification',icon:'🚔',required:false},
];

let S={properties:[],expenses:[],cash:[],tasks:[],reminders:[]};
let user=null,isAdmin=false,curTab='dash',vProp=null,vRoom=null,saveT=null;

// ── DATA SAFETY FLAGS ────────────────────────────────────────
// dataLoadedFromFirebase: becomes true only after Firebase 
// successfully returns data in this browser session.
// Until this is true, save() will NOT push to Firebase —
// it only saves to localStorage as a local backup.
// This prevents a fresh-browser or network-error scenario
// from pushing empty data and wiping all tenant/payment records.
let dataLoadedFromFirebase = false;

// lastKnownFirebaseData: a cache of the most recently 
// confirmed good data from Firebase. Used as a safety net
// if something tries to push corrupted/empty data.
let lastKnownFirebaseData = null;
let billMo='',expMo='';
let workDate='';

// ── UTILS ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function mk(d){const dt=d||new Date();return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');}
function ml(k){if(!k)return'—';const[y,m]=k.split('-');return new Date(y,m-1).toLocaleString('en-IN',{month:'long',year:'numeric'});}
function fd(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fm(n){return'₹'+Number(n||0).toLocaleString('en-IN');}
function today(){return new Date().toISOString().split('T')[0];}
function dl(s){if(!s)return null;return Math.ceil((new Date(s)-new Date())/86400000);}
function sameOrBeforeToday(s){return !!s&&s<=today();}
function tenantIsActive(t){const d=(t&& (t.activeFrom||t.moveInDate))||'';return !!(t&&t.name&&sameOrBeforeToday(d||today()));}
function activeLeaseForRoom(r){
  return (S.leases||[]).find(l=>l.roomId===(r&&r.id)&&l.status==='active'&&(!l.leaseStart||sameOrBeforeToday(l.leaseStart)))||null;
}
function tenantTokenAmount(t){return Number((t&&(t.tokenAmount||t.tokenReceived||t.token))||0);}
function tenantAwaitingLease(r){return !!(r&&r.tenant&&r.tenant.name&&tenantTokenAmount(r.tenant)>0&&!activeLeaseForRoom(r));}
function roomBookingInfo(r){
  if(r&&r.token)return r.token;
  if(!tenantAwaitingLease(r))return null;
  const t=r.tenant;
  return {
    name:t.name||'',
    phone:t.phone||'',
    moveInDate:t.activeFrom||t.moveInDate||'',
    amount:tenantTokenAmount(t),
    securityBalance:t.securityBalance!=null?t.securityBalance:r.securityBalance,
    advanceRent:t.advanceRent||0,
    advanceRentStatus:t.advanceRentStatus||'pending'
  };
}
function isRoomOccupied(r){return !!(r&&tenantIsActive(r.tenant)&&!tenantAwaitingLease(r));}
function isRoomPrebooked(r){return !!(r&&(r.token||tenantAwaitingLease(r)||(r.tenant&&r.tenant.name&&!tenantIsActive(r.tenant)))&&!isRoomOccupied(r));}
function roomStatus(r){return isRoomOccupied(r)?'occupied':isRoomPrebooked(r)?'prebooked':'vacant';}
function monthDateStart(month){return new Date(month+'-01T00:00:00');}
function monthDateEnd(month){const[y,m]=month.split('-').map(Number);return new Date(y,m,0,23,59,59,999);}
function daysInMonth(month){const[y,m]=month.split('-').map(Number);return new Date(y,m,0).getDate();}
function sameMonthDate(dateStr, month){return !!dateStr&&dateStr.slice(0,7)===month;}
function proratedRentForMonth(rent,startDate,month,endDate=''){
  const base=Number(rent||0);
  if(!base)return 0;
  if(!startDate)return base;
  if(!sameMonthDate(startDate,month))return base;
  const ms=monthDateStart(month),me=monthDateEnd(month);
  const s=new Date(startDate+'T00:00:00');
  const e=endDate?new Date(endDate+'T00:00:00'):me;
  const a=s>ms?s:ms,b=e<me?e:me;
  if(b<a)return 0;
  const activeDays=Math.floor((b-a)/86400000)+1;
  return Math.round(base*activeDays/daysInMonth(month));
}
function syncDueBookings(){
  let changed=false;
  (S.properties||[]).forEach(p=>((p.rooms)||[]).forEach(r=>{
    if(r.token&&!r.tenant&&sameOrBeforeToday(r.token.moveInDate)){
      const t=r.token;
      r.tenant={
        name:t.name||'',
        phone:t.phone||'',
        address:t.address||'',
        aadhaar:t.aadhaar||'',
        pan:t.pan||'',
        office:t.office||'',
        fatherName:t.fatherName||'',
        moveInDate:t.moveInDate||today(),
        activeFrom:t.moveInDate||today(),
        advanceRent:Number(t.advanceRent||0),
        advanceRentStatus:t.advanceRentStatus||'pending',
        security:Number(t.securityDeposit||r.security||0),
        securityBalance:t.securityBalance!=null?Number(t.securityBalance||0):undefined,
        tokenAmount:Number(t.amount||0),
        tokenDate:t.tokenDate||today(),
        tokenAdjustedTo:'security',
      };
      if(t.agreedRent!=null&&t.agreedRent!=='')r.rent=Number(t.agreedRent||r.rent||0);
      if(t.securityDeposit!=null&&t.securityDeposit!=='')r.security=Number(t.securityDeposit||r.security||0);
      if(t.securityBalance!=null&&t.securityBalance!=='')r.securityBalance=Number(t.securityBalance||0);
      delete r.token;
      changed=true;
    }
  }));
  if(changed)sched();
  return changed;
}
function prevReadingForMonth(readings,month){
  return (readings||[]).filter(x=>x.month&&x.month<month&&x.reading!=null).sort((a,b)=>a.month.localeCompare(b.month)).pop()||null;
}
function localDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ensureWorkDate(){if(!workDate)workDate=today();}
function shiftWorkDate(delta){ensureWorkDate();const[y,m,d]=workDate.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+delta);workDate=localDate(dt);renderTab();}
function goWorkToday(){workDate=today();renderTab();}
function workDateNavHTML(){
  ensureWorkDate();
  const d=new Date(workDate+'T00:00:00');
  const isToday=workDate===today();
  return`<div class="work-date-nav"><button class="work-nav-btn" onclick="shiftWorkDate(-1)">&#8592;</button><div class="work-nav-date"><div class="work-nav-main">${isToday?'Today':d.toLocaleDateString('en-IN',{weekday:'long'})}</div><div class="work-nav-sub">${d.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div></div><button class="work-nav-btn" onclick="shiftWorkDate(1)">&#8594;</button><button class="work-today-btn" onclick="goWorkToday()">Today</button></div>`;
}
function toast(msg,dur=2600){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function openM(ti,bo,fo=''){document.getElementById('mTitle').textContent=ti;document.getElementById('mBody').innerHTML=bo;document.getElementById('mFoot').innerHTML=fo;document.getElementById('ov').classList.add('open');}
function closeM(){document.getElementById('ov').classList.remove('open');}
function ovClick(e){if(e.target.id==='ov')closeM();}
function docCompleteness(r){const docs=r.docs||{};const mr=DOC_TYPES.filter(d=>d.required&&!docs[d.key]);return{uploaded:DOC_TYPES.filter(d=>docs[d.key]).length,missingRequired:mr.length,total:DOC_TYPES.length};}

// ── AUTH ──
function showAppForUser(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  document.getElementById('tbUser').textContent=user;
  const tr=document.getElementById('tbRole');tr.textContent=isAdmin?'Admin':'Staff';tr.className='tb-role '+(isAdmin?'admin':'staff');
}
function doLogin(){
  const pass=document.getElementById('lPass').value.trim();
  if(!pass){toast('Enter your password');return;}
  if(pass!==ADMIN&&pass!==STAFF){document.getElementById('lErr').style.display='block';return;}
  user=pass===ADMIN?'KD Taneja':'Preeti';
  isAdmin=(pass===ADMIN);
  localStorage.setItem('rentdesk_user',JSON.stringify({user,isAdmin}));
  showAppForUser();
  loadData();
  actLog('Login');
}
function doLogout(){actLog('Logout');user=null;localStorage.removeItem('rentdesk_user');document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('lPass').value='';document.getElementById('lErr').style.display='none';}
function restoreSession(){
  try{
    const saved=JSON.parse(localStorage.getItem('rentdesk_user')||'null');
    if(!saved||!saved.user)return false;
    user=saved.user;isAdmin=!!saved.isAdmin;
    showAppForUser();
    loadData();
    return true;
  }catch(e){return false;}
}

// ── FIREBASE ──
async function loadData(){
  let firebaseLoaded=false;
  try{
    const r=await fetch(FB_URL);
    if(r.ok){
      const d=await r.json();
      if((d.fields&&d.fields.data)){
        const parsed=JSON.parse(d.fields.data.stringValue);
        if(parsed){
          // Smart merge: only overwrite arrays if Firebase version
          // is non-empty, or if local is also empty. This prevents
          // a corrupted empty array in Firebase from wiping good 
          // local data (e.g. if properties:[] comes from Firebase,
          // keep the local properties instead).
          const merged = {...S};
          for(const key of Object.keys(parsed)){
            if(Array.isArray(parsed[key])){
              // Only take Firebase array if it has data, or local is also empty
              if(parsed[key].length > 0 || !merged[key] || merged[key].length === 0){
                merged[key] = parsed[key];
              }
            } else {
              merged[key] = parsed[key];
            }
          }
          S = merged;
          firebaseLoaded=true;
          // Confirm data loaded — unlock Firebase saves for this session
          dataLoadedFromFirebase = true;
          // Cache a deep copy as our safety net
          lastKnownFirebaseData = JSON.parse(JSON.stringify(S));
        }
      }
    }
  }catch(e){}
  // If Firebase failed, try localStorage backup
  if(!firebaseLoaded){
    try{
      const backup=localStorage.getItem('rentdesk_backup');
      const backupTime=localStorage.getItem('rentdesk_backup_time');
      if(backup){
        const parsed=JSON.parse(backup);
        if(parsed){
          S={...S,...parsed};
          const mins=Math.round((Date.now()-Number(backupTime))/60000);
          toast('⚠️ Loaded local backup ('+mins+'m ago) — check connection',5000);
        }
      }else{
        toast('⚠️ Could not reach server — starting fresh',4000);
      }
    }catch(e){}
  }
  if(!S.properties)S.properties=[];
  if(!S.expenses)S.expenses=[];
  if(!S.cash)S.cash=[];
  if(!S.tasks)S.tasks=[];
  if(!S.reminders)S.reminders=[];
  if(!S.attendance)S.attendance=[];
  if(!S.leases)S.leases=[];
  if(!S.pastTenants)S.pastTenants=[];
  if(!S.activityLog)S.activityLog=[];
  syncDueBookings();
  renderTab();
  // Safe poll — only syncs if no local edits in last 30s
  setInterval(async()=>{
    if(saveT)return;
    if(window._lastEdit&&Date.now()-window._lastEdit<30000)return;
    try{
      const r=await fetch(FB_URL);
      if(r.ok){
        const d=await r.json();
        if((d.fields&&d.fields.data)){
          const remote=JSON.parse(d.fields.data.stringValue);
          if(!remote)return;
          // Only accept if remote has at least as much data
          // Count ALL major data arrays — not just properties/expenses/cash.
          // This ensures leases and pastTenants can't be silently wiped
          // by a poll that only checks three of the six data stores.
          const lc=((S.properties&&S.properties.length)||0)
                  +((S.expenses&&S.expenses.length)||0)
                  +((S.cash&&S.cash.length)||0)
                  +((S.leases&&S.leases.length)||0)
                  +((S.pastTenants&&S.pastTenants.length)||0);
          const rc=((remote.properties&&remote.properties.length)||0)
                  +((remote.expenses&&remote.expenses.length)||0)
                  +((remote.cash&&remote.cash.length)||0)
                  +((remote.leases&&remote.leases.length)||0)
                  +((remote.pastTenants&&remote.pastTenants.length)||0);
          if(rc>=lc){
            S={...S,...remote};
            if(!S.properties)S.properties=[];
            if(!S.expenses)S.expenses=[];
            if(!S.cash)S.cash=[];
            if(!S.tasks)S.tasks=[];
            if(!S.reminders)S.reminders=[];
            if(!S.leases)S.leases=[];
            if(!S.pastTenants)S.pastTenants=[];
            // Update safety flag and cache since this is a confirmed pull
            dataLoadedFromFirebase=true;
            lastKnownFirebaseData=JSON.parse(JSON.stringify(S));
            renderTab();
          }
        }
      }
    }catch(e){}
  },20000);
}
function setSaveIndicator(state){
  const el=document.getElementById('saveIndicator');
  if(!el)return;
  if(state==='saving'){el.textContent='💾 Saving...';el.style.color='var(--muted)';}
  else if(state==='saved'){el.textContent='✓ Saved';el.style.color='var(--green)';setTimeout(()=>{if(el.textContent==='✓ Saved')el.textContent='';},3000);}
  else if(state==='error'){el.textContent='⚠️ Save failed';el.style.color='var(--red)';}
}
async function save(){
  setSaveIndicator('saving');
  // ALWAYS save to localStorage first — this is our instant local backup
  // regardless of Firebase status.
  try{localStorage.setItem('rentdesk_backup',JSON.stringify(S));localStorage.setItem('rentdesk_backup_time',Date.now());}catch(e){}

  // SAFETY CHECK: Only push to Firebase if data was confirmed loaded 
  // from Firebase in this session. If not, we protect Firebase by 
  // refusing the push — the local backup above keeps data safe locally.
  if(!dataLoadedFromFirebase){
    console.warn('SAFETY: Firebase push blocked — data not yet confirmed from Firebase this session. Local backup saved.');
    setSaveIndicator('error');
    // Try to load from Firebase one more time before giving up
    try{
      const r=await fetch(FB_URL);
      if(r.ok){
        const d=await r.json();
        if(d.fields&&d.fields.data){
          const parsed=JSON.parse(d.fields.data.stringValue);
          if(parsed){
            // Safely merge without losing local data
            const merged={...S};
            for(const key of Object.keys(parsed)){
              if(Array.isArray(parsed[key])){
                if(parsed[key].length>0||!merged[key]||merged[key].length===0) merged[key]=parsed[key];
              } else { merged[key]=parsed[key]; }
            }
            S=merged;
            dataLoadedFromFirebase=true;
            lastKnownFirebaseData=JSON.parse(JSON.stringify(S));
            // Now safe to push
            const r2=await fetch(FB_URL+'&updateMask.fieldPaths=data',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{data:{stringValue:JSON.stringify(S)}}})});
            if(r2.ok){setSaveIndicator('saved');}
            else{setSaveIndicator('error');}
          }
        }
      }
    }catch(e2){console.warn('SAFETY recovery fetch failed:',e2);}
    return;
  }

  // Normal save path — data confirmed from Firebase, safe to push
  try{
    const r=await fetch(FB_URL+'&updateMask.fieldPaths=data',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{data:{stringValue:JSON.stringify(S)}}})});
    if(r.ok){
      setSaveIndicator('saved');
      // Update our safety cache with the freshly confirmed data
      lastKnownFirebaseData=JSON.parse(JSON.stringify(S));
    }
    else{setSaveIndicator('error');console.log('Save failed:',r.status);}
  }catch(e){setSaveIndicator('error');console.log('Save error:',e);}
}
function sched(){window._lastEdit=Date.now();clearTimeout(saveT);saveT=setTimeout(save,900);}

// ── ACTIVITY LOG ──
function actLog(action){
  if(!S.activityLog)S.activityLog=[];
  const now=new Date();
  const dd=String(now.getDate()).padStart(2,'0');
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const yyyy=now.getFullYear();
  const hh=String(now.getHours()).padStart(2,'0');
  const mn=String(now.getMinutes()).padStart(2,'0');
  const ts=`[${dd}/${mm}/${yyyy} ${hh}:${mn}]`;
  const uname=user||'Unknown';
  S.activityLog.unshift({ts,user:uname,action,full:`${ts} [${uname}] ${action}`});
  if(S.activityLog.length>100)S.activityLog=S.activityLog.slice(0,100);
}

function roomCardH(r,pid){
  const status=roomStatus(r),ht=status==='occupied',bk=roomBookingInfo(r),d=(r.lease&&r.lease.endDate)?dl(r.lease.endDate):null;
  const alert=d!==null&&d<=30?`<div style="font-size:11px;color:var(--red);margin-top:4px;">⚠️ ${d<=0?'Lease expired':d+'d left'}</div>`:'';
  const dc=ht?docCompleteness(r):{missingRequired:0,uploaded:0};
  const docBadge=ht?(dc.missingRequired>0?`<div style="font-size:11px;color:var(--red);margin-top:4px;font-weight:600;">🔴 ${dc.missingRequired} doc${dc.missingRequired>1?'s':''} missing</div>`:`<div style="font-size:11px;color:var(--green);margin-top:4px;">✅ Docs complete</div>`):'';
  const noticeBadge=(r.notice&&!r.notice.cleared)?`<div style="font-size:11px;color:var(--red);margin-top:4px;font-weight:600;">📢 Vacating ${fd(r.notice.vacateDate)}</div>`:'';
  const secBal=bk?((bk.securityBalance!=null)?bk.securityBalance:Math.max(0,Number(bk.securityDeposit||0)-Number(bk.amount||0))):null;
  const tokenBadge=bk?`<div style="font-size:11px;color:var(--purple,#7c3aed);margin-top:4px;font-weight:600;">🔑 Booked: ${bk.name} from ${fd(bk.moveInDate)}</div>${bk.advanceRentStatus==='pending'?`<div style="font-size:11px;color:var(--amber);margin-top:4px;font-weight:600;">💸 Advance rent pending</div>`:''}${secBal!=null?`<div style="font-size:11px;color:var(--blue);margin-top:4px;font-weight:600;">🔐 Security balance: ${fm(secBal)}</div>`:''}`:'';
  return`<div class="room-card" onclick="goRoom('${pid}','${r.id}')"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;"><div class="room-type">${r.type}${r.unitNo?' #'+r.unitNo:''}</div><span class="badge ${status==='occupied'?'badge-grn':status==='prebooked'?'badge-pur':'badge-amb'}">${status==='occupied'?'Occupied':status==='prebooked'?'Pre-booked':'Vacant'}</span></div><div class="room-rent">${fm(r.rent)}/mo</div><div class="room-tenant">${ht?'👤 '+r.tenant.name:bk?'🔑 '+bk.name+' ('+fd(bk.moveInDate)+')':'No tenant'}</div>${r.balance>0?`<div style="font-size:11px;color:var(--red);margin-top:4px;font-weight:600;">Bal: ${fm(r.balance)}</div>`:''}${docBadge}${alert}${noticeBadge}${tokenBadge}</div>`;
}
function backProps(){vProp=null;vRoom=null;renderProps();}

function updProp(id){const p=S.properties.find(x=>x.id===id);p.name=document.getElementById('pN').value.trim();p.address=document.getElementById('pA').value.trim();p.electricityRate=document.getElementById('pR').value;sched();closeM();renderPropDetail();toast('✅ Updated');}

// ── MAIN METER ──
function openMainMeter(pid){
  const p=S.properties.find(x=>x.id===pid);
  const readings=(p.mainMeter||[]).slice().sort((a,b)=>a.month.localeCompare(b.month));
  const cm=mk(),cur=readings.find(x=>x.month===cm),prev=prevReadingForMonth(readings,cm);
  const prevVal=cur&&cur.oldReading!=null?cur.oldReading:(prev&&prev.reading!=null?prev.reading:'');
  openM('⚡ Main Meter — '+p.name,`
  <div class="frow"><div><label class="flabel">Month</label><input class="finput" id="mmM" type="month" value="${cm}" oninput="mmMonthChanged('${pid}')"/></div><div><label class="flabel">Rate per Unit (₹)</label><input class="finput" id="mmR" type="number" value="${(cur&&cur.rate)||p.electricityRate||''}" placeholder="8.50" oninput="mmCalc()"/></div></div>
  <div class="frow">
    <div><label class="flabel">Previous Reading</label><input class="finput" id="mmO" type="number" value="${prevVal}" oninput="mmCalc()"/><div class="fhint" id="mmHint">${prev?'📌 From '+ml(prev.month)+': '+prev.reading+' units':'No previous reading'}</div></div>
    <div><label class="flabel">Current Reading *</label><input class="finput" id="mmN" type="number" value="${(cur&&cur.reading)||''}" placeholder="Enter new reading" oninput="mmCalc()"/></div>
  </div>
  <div class="ecalc" id="mmBox"><div class="ecalc-title">📊 Main Meter Calculation</div><div class="ecalc-row"><span>Previous</span><span id="mm1">—</span></div><div class="ecalc-row"><span>Current</span><span id="mm2">—</span></div><div class="ecalc-row"><span>Units</span><span id="mm3" style="color:var(--blue)">—</span></div><div class="ecalc-row"><span>Rate</span><span id="mm4">—</span></div><div class="ecalc-total"><span>Building Bill</span><span id="mm5">—</span></div></div>
  <div class="frow1" style="margin-top:10px;"><label class="flabel">Manual Override (₹) <span style="color:var(--muted);font-weight:400;text-transform:none;">optional</span></label><input class="finput" id="mmA" type="number" value="${(cur&&cur.bill)||''}" placeholder="Leave blank = auto-calculated"/></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-orange" onclick="saveMainMeter('${pid}')">Save</button>`);
  setTimeout(mmCalc,80);
}
function mmMonthChanged(pid){
  const p=S.properties.find(x=>x.id===pid);if(!p)return;
  const mo=document.getElementById('mmM').value;
  const readings=(p.mainMeter||[]).slice().sort((a,b)=>a.month.localeCompare(b.month));
  const cur=readings.find(x=>x.month===mo),prev=prevReadingForMonth(readings,mo);
  document.getElementById('mmO').value=cur&&cur.oldReading!=null?cur.oldReading:(prev&&prev.reading!=null?prev.reading:'');
  document.getElementById('mmN').value=(cur&&cur.reading)||'';
  document.getElementById('mmR').value=(cur&&cur.rate)||p.electricityRate||'';
  document.getElementById('mmA').value=(cur&&cur.bill)||'';
  const hint=document.getElementById('mmHint');
  if(hint)hint.textContent=prev?'📌 From '+ml(prev.month)+': '+prev.reading+' units':'No previous reading';
  mmCalc();
}
function mmCalc(){const o=Number((document.getElementById('mmO')||{}).value||0),n=Number((document.getElementById('mmN')||{}).value||0),r=Number((document.getElementById('mmR')||{}).value||0),box=document.getElementById('mmBox');if(!box)return;if(n>0&&r>0){const u=n-o,t=u*r;box.classList.add('show');document.getElementById('mm1').textContent=o+' units';document.getElementById('mm2').textContent=n+' units';document.getElementById('mm3').textContent=u+' units';document.getElementById('mm4').textContent='₹'+r+'/unit';document.getElementById('mm5').textContent=fm(t);}else box.classList.remove('show');}
function saveMainMeter(pid){
  const n=document.getElementById('mmN').value;if(!n){toast('❌ Enter reading');return;}
  const p=S.properties.find(x=>x.id===pid);if(!p.mainMeter)p.mainMeter=[];
  const mo=document.getElementById('mmM').value,o=Number(document.getElementById('mmO').value||0),nR=Number(n),r=Number(document.getElementById('mmR').value||0),u=nR-o,man=document.getElementById('mmA').value;
  p.mainMeter=p.mainMeter.filter(x=>x.month!==mo);p.mainMeter.push({month:mo,oldReading:o,reading:nR,units:u,rate:r,bill:man?Number(man):u*r});p.electricityRate=document.getElementById('mmR').value;
  sched();closeM();renderPropDetail();toast('✅ Main meter saved');
}

function collectRoom(ex={}){
  const tName=(document.getElementById('tN').value||'').trim();

    type:document.getElementById('rT').value,unitNo:document.getElementById('rU').value.trim(),
    rent:document.getElementById('rR').value,security:document.getElementById('rS').value,
    notes:document.getElementById('rNt').value.trim(),
    tenant:tName?{...(existingTenant||{}),name:tName,phone:document.getElementById('tP').value.trim(),address:document.getElementById('tA').value.trim(),aadhaar:document.getElementById('tAd').value.trim(),pan:document.getElementById('tPn').value.trim(),office:document.getElementById('tO').value.trim()}:((existingTenant&&existingTenant.name)?existingTenant:null),
    token:ex.token||null,
    lease:{startDate:document.getElementById('lS').value,endDate:document.getElementById('lE').value,tenure:document.getElementById('lTen').value,lockIn:document.getElementById('lLock').value,escalation:document.getElementById('lEc').value,noticePeriod:document.getElementById('lN').value,noticeServed:document.getElementById('lNS').value}

function openAddRoom(pid){openM('Add Room / Unit',roomFormH(),`<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-orange" onclick="saveRoom('${pid}')">Save</button>`);}

// ── ELECTRICITY ──
function openElec(pid,rid,month){
  const p=S.properties.find(x=>x.id===pid),r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  const readings=(r.electricityReadings||[]).slice().sort((a,b)=>a.month.localeCompare(b.month));
  const cm=month||mk(),cur=readings.find(x=>x.month===cm),prev=prevReadingForMonth(readings,cm);
  const prevVal=cur&&cur.oldReading!=null?cur.oldReading:(prev&&prev.reading!=null?prev.reading:'');
  openM('⚡ Electricity — '+r.type+(r.unitNo?' #'+r.unitNo:''),`
  <div class="frow"><div><label class="flabel">Month</label><input class="finput" id="eM" type="month" value="${cm}" oninput="eMonthChanged('${pid}','${rid}')"/></div><div><label class="flabel">Rate per Unit (₹) *</label><input class="finput" id="eRt" type="number" value="${(cur&&cur.rate)||p.electricityRate||''}" placeholder="8.50" oninput="eCalc()"/></div></div>
  <div class="frow">
    <div><label class="flabel">Previous Reading</label><input class="finput" id="eO" type="number" value="${prevVal}" oninput="eCalc()"/><div class="fhint" id="eHint">${prev?'📌 Auto: '+ml(prev.month)+' → '+prev.reading+' units':'First reading'}</div></div>
    <div><label class="flabel">Current Reading *</label><input class="finput" id="eN" type="number" value="${(cur&&cur.reading)||''}" placeholder="New meter reading" oninput="eCalc()"/></div>
  </div>
  <div class="ecalc" id="eBox"><div class="ecalc-title">⚡ Bill Calculation</div><div class="ecalc-row"><span>Previous Reading</span><span id="e1">—</span></div><div class="ecalc-row"><span>Current Reading</span><span id="e2">—</span></div><div class="ecalc-row"><span>Units Consumed</span><span id="e3" style="color:var(--blue)">—</span></div><div class="ecalc-row"><span>Rate per Unit</span><span id="e4">—</span></div><div class="ecalc-total"><span>Total Bill</span><span id="e5">—</span></div></div>
  <div class="frow1" style="margin-top:10px;"><label class="flabel">Manual Override <span style="color:var(--muted);font-weight:400;text-transform:none;">— leave blank for auto</span></label><input class="finput" id="eA" type="number" value="${(cur&&cur.manualAmt)||''}" placeholder="Auto-calculated"/></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-blue" onclick="openElecBillFromForm('${pid}','${rid}')">📄 View Bill</button><button class="btn btn-orange" onclick="saveElec('${pid}','${rid}')">💾 Save</button>`);
  setTimeout(eCalc,80);
}
function eMonthChanged(pid,rid){
  const p=S.properties.find(x=>x.id===pid),r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  if(!p||!r)return;
  const mo=document.getElementById('eM').value;
  const readings=(r.electricityReadings||[]).slice().sort((a,b)=>a.month.localeCompare(b.month));
  const cur=readings.find(x=>x.month===mo),prev=prevReadingForMonth(readings,mo);
  document.getElementById('eO').value=cur&&cur.oldReading!=null?cur.oldReading:(prev&&prev.reading!=null?prev.reading:'');
  document.getElementById('eN').value=(cur&&cur.reading)||'';
  document.getElementById('eRt').value=(cur&&cur.rate)||p.electricityRate||'';
  document.getElementById('eA').value=(cur&&cur.manualAmt)||'';
  const hint=document.getElementById('eHint');
  if(hint)hint.textContent=prev?'📌 Auto: '+ml(prev.month)+' → '+prev.reading+' units':'First reading';
  eCalc();
}
function eCalc(){const o=Number((document.getElementById('eO')||{}).value||0),n=Number((document.getElementById('eN')||{}).value||0),r=Number((document.getElementById('eRt')||{}).value||0),box=document.getElementById('eBox');if(!box)return;if(n>0&&r>0){const u=n-o,t=u*r;box.classList.add('show');document.getElementById('e1').textContent=o+' units';document.getElementById('e2').textContent=n+' units';document.getElementById('e3').textContent=u+' units';document.getElementById('e4').textContent='₹'+r+'/unit';document.getElementById('e5').textContent=fm(t);}else box.classList.remove('show');}
function openElecBillFromForm(pid,rid){openElecBill(pid,rid,document.getElementById('eM').value);}
function saveElec(pid,rid){
  const n=document.getElementById('eN').value,rt=document.getElementById('eRt').value;
  if(!n){toast('❌ Enter current reading');return;}if(!rt){toast('❌ Enter rate');return;}
  const p=S.properties.find(x=>x.id===pid),r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  if(!r.electricityReadings)r.electricityReadings=[];p.electricityRate=rt;
  const mo=document.getElementById('eM').value,o=Number(document.getElementById('eO').value||0),nR=Number(n),rtN=Number(rt),u=nR-o,man=document.getElementById('eA').value;
  r.electricityReadings=r.electricityReadings.filter(x=>x.month!==mo);
  r.electricityReadings.push({month:mo,oldReading:o,reading:nR,units:u,rate:rtN,amount:man?Number(man):u*rtN,manualAmt:man?Number(man):null});
  sched();closeM();if(vRoom)renderRoomDetail();else renderBilling();toast('✅ Reading saved');
}

// ── PRINT / PDF ──
function pdfName(title){return title.replace(/[^a-z0-9]+/gi,'-').replace(/^-|-$/g,'')+'.pdf';}
function downloadPdfBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}
async function sharePdfHtml(fullHtml,title,orientation){
  if(!window.html2pdf)return false;
  const name=pdfName(title);
  const frame=document.createElement('iframe');
  frame.style.cssText='position:fixed;left:-10000px;top:0;width:1200px;height:1800px;border:0;opacity:0;pointer-events:none;';
  document.body.appendChild(frame);
  try{
    const doc=frame.contentDocument||frame.contentWindow.document;
    doc.open();doc.write(fullHtml);doc.close();
    await new Promise(resolve=>setTimeout(resolve,700));
    toast('📄 Preparing PDF...',3000);
    const opt={
      margin:orientation==='landscape'?5:10,
      filename:name,
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:orientation||'portrait'}
    };
    const blob=await html2pdf().set(opt).from(doc.body).outputPdf('blob');
    if(window.File&&navigator.canShare&&navigator.share){
      const file=new File([blob],name,{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:title,text:title});
        toast('✅ PDF ready to share',2500);
        return true;
      }
    }
    downloadPdfBlob(blob,name);
    toast('📄 PDF downloaded — share it from Downloads',5000);
    return true;
  }catch(e){
    return false;
  }finally{
    if(frame.parentNode)frame.parentNode.removeChild(frame);
  }
}
// Reliable landscape PDF for monthly reports — dynamic iframe height avoids clipping multi-property reports
async function shareReportPdfBlob(fullHtml,title){
  if(!window.html2pdf){toast('❌ PDF library not loaded — try refresh',4000);return false;}
  const name=pdfName(title);
  const frame=document.createElement('iframe');
  frame.style.cssText='position:fixed;left:-10000px;top:0;width:1123px;height:10px;border:0;opacity:0;pointer-events:none;';
  document.body.appendChild(frame);
  try{
    const doc=frame.contentDocument||frame.contentWindow.document;
    doc.open();doc.write(fullHtml);doc.close();
    await new Promise(r=>setTimeout(r,800));
    // Resize iframe to fit ALL content — fixes landscape multi-property clipping
    const fullH=Math.max(doc.body.scrollHeight,doc.documentElement.scrollHeight,doc.body.offsetHeight)+80;
    frame.style.height=fullH+'px';
    await new Promise(r=>setTimeout(r,200));
    toast('📄 Preparing PDF...',3000);
    const opt={
      margin:8,
      filename:name,
      image:{type:'jpeg',quality:0.95},
      html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff',windowWidth:1123,height:fullH},
      jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
      pagebreak:{mode:['avoid-all','css','legacy']}
    };
    const blob=await html2pdf().set(opt).from(doc.body).outputPdf('blob');
    if(window.File&&navigator.canShare&&navigator.share){
      const file=new File([blob],name,{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file],title:title,text:title});
          toast('✅ Pick WhatsApp from share menu',3000);
          return true;
        }catch(err){
          if(err.name==='AbortError')return true; // user cancelled — that's fine
          // any other error → fall through to download
        }
      }
    }
    downloadPdfBlob(blob,name);
    toast('📄 PDF saved — open WhatsApp & attach from Downloads',5000);
    return true;
  }catch(e){
    console.error('Report PDF failed:',e);
    toast('❌ PDF generation failed — falling back to print',3000);
    return false;
  }finally{
    if(frame.parentNode)frame.parentNode.removeChild(frame);
  }
}
// ── pdfmake (lazy-loaded) — produces TRUE vector PDFs that match print preview quality ──
function loadPdfMake(){
  return new Promise((resolve,reject)=>{
    if(window.pdfMake&&window.pdfMake.vfs){resolve();return;}
    toast('📦 Loading PDF library (first time only)...',3000);
    const s1=document.createElement('script');
    s1.src='https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.min.js';
      s2.onload=()=>resolve();
      s2.onerror=()=>reject(new Error('vfs_fonts load failed'));
      document.head.appendChild(s2);
    };
    s1.onerror=()=>reject(new Error('pdfmake load failed'));
    document.head.appendChild(s1);
  });
}

// Generate true vector PDF via pdfmake and share to WhatsApp / share sheet
async function shareMonthlyReportPdfMake(month,filterPropId){
  try{await loadPdfMake();}
  catch(e){console.error('pdfmake load failed:',e);return false;}
  if(!window.pdfMake)return false;
  const fileName=pdfName('KDC-Report-'+month);
  const fileTitle='KDC Monthly Report \u2014 '+ml(month);
  toast('📄 Building PDF...',2500);
  return new Promise(resolve=>{
    try{
      const docDef=buildMonthlyReportDocDef(month,filterPropId);
      pdfMake.createPdf(docDef).getBlob(async blob=>{
        try{
          if(window.File&&navigator.canShare&&navigator.share){
            const file=new File([blob],fileName,{type:'application/pdf'});
            if(navigator.canShare({files:[file]})){
              try{
                await navigator.share({files:[file],title:fileTitle,text:fileTitle});
                toast('✅ Pick WhatsApp from share menu',3000);
                resolve(true);return;
              }catch(err){
                if(err.name==='AbortError'){resolve(true);return;}
              }
            }
          }
          downloadPdfBlob(blob,fileName);
          toast('📄 PDF saved — open WhatsApp & attach from Downloads',5000);
          resolve(true);
        }catch(e){
          console.error('share step failed:',e);
          try{downloadPdfBlob(blob,fileName);resolve(true);}
          catch(e2){resolve(false);}
        }
      });
    }catch(e){
      console.error('pdfmake build failed:',e);
      toast('❌ PDF build failed — falling back',3000);
      resolve(false);
    }
  });
}

// ── PAYMENT ──
let _pyPid=null,_pyRid=null;
// ── PER-MONTH BALANCE HELPERS ──
function prevMonth(mo){
  const[y,m]=mo.split('-').map(Number);
  const d=new Date(y,m-2);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function calcClosingBalance(r,mo){
  // Compute what's left unpaid after a given month, purely from payment history
  // This is deterministic — no stored state needed
  const elec=(r.electricityReadings||[]).find(x=>x.month===mo);
  const carryIn=getCarryIn(r,mo);
  const dedTotal=(r.deductions||[]).filter(d=>d.month===mo).reduce((s,d)=>s+Number(d.amount||0),0);
  const due=Number(r.rent||0)+Number((elec&&elec.amount)||0)+carryIn-dedTotal;
  const paid=(r.payments||[]).filter(x=>x.month===mo).reduce((s,x)=>s+Number(x.amount||0),0);
  return Math.max(0,due-paid);
}
function getCarryIn(r,mo){
  if(!r.balanceByMonth)r.balanceByMonth={};
  const pm=prevMonth(mo);
  // First check stored history for previous month
  if(r.balanceByMonth[pm]!==undefined)return r.balanceByMonth[pm];
  // If no history at all, check if there are payments for prev month — compute from scratch
  const pmPayments=(r.payments||[]).filter(x=>x.month===pm);
  if(pmPayments.length>0){
    // Prev month had payments recorded — compute its closing balance
    const pmElec=(r.electricityReadings||[]).find(x=>x.month===pm);
    // For prev month's carry-in, check one more month back (use stored r.balance as base for oldest)
    const pmCarryIn=r.balanceByMonth[prevMonth(pm)]!==undefined
      ? r.balanceByMonth[prevMonth(pm)]
      : (r.balance||0);
    const pmDed=(r.deductions||[]).filter(d=>d.month===pm).reduce((s,d)=>s+Number(d.amount||0),0);
    const pmDue=Number(r.rent||0)+Number((pmElec&&pmElec.amount)||0)+pmCarryIn-pmDed;
    const pmPaid=pmPayments.reduce((s,x)=>s+Number(x.amount||0),0);
    return Math.max(0,pmDue-pmPaid);
  }
  // No payments for prev month — use r.balance as legacy fallback only if no balanceByMonth exists
  if(Object.keys(r.balanceByMonth).length===0)return r.balance||0;
  return 0;
}
function setBalanceAfterMonth(r,mo,val){
  if(!r.balanceByMonth)r.balanceByMonth={};
  r.balanceByMonth[mo]=Math.max(0,val);
  r.balance=Math.max(0,val);
}
function _calcDue(r,mo){
  const elec=(r.electricityReadings||[]).find(x=>x.month===mo);
  const bal=getCarryIn(r,mo);
  const dedTotal=(r.deductions||[]).filter(d=>d.month===mo).reduce((s,d)=>s+Number(d.amount||0),0);
  return{elec,bal,dedTotal,due:Number(r.rent||0)+Number((elec&&elec.amount)||0)+bal-dedTotal};
}

// ── PLANNER ──
function dueKind(date,done=false){
  if(done)return'done';
  if(!date)return'upcoming';
  const d=dl(date);
  return d<0?'overdue':d===0?'today':'upcoming';
}
function dueText(date,done=false){
  if(!date)return'No due date';
  const d=dl(date);
  if(done)return'Completed';
  if(d<0)return'Overdue · '+fd(date);
  if(d===0)return'Due Today';
  if(d===1)return'Due Tomorrow';
  return'Due '+fd(date);
}
function priorityBadge(priority){
  return priority==='high'?`<span class="badge badge-red">🔴 High</span>`:priority==='medium'?`<span class="badge badge-amb">🟡 Medium</span>`:`<span class="badge badge-grey">⚪ Low</span>`;
}
function removeReminderTask(reminderId){
  if(!reminderId||!S.tasks)return;
  S.tasks=S.tasks.filter(t=>t.reminderId!==reminderId);
}
function upsertReminderTask(reminder){
  if(!reminder||!reminder.dueDate)return;
  if(!S.tasks)S.tasks=[];
  removeReminderTask(reminder.id);
  S.tasks.push({
    id:uid(),
    title:'Reminder: '+(reminder.title||'Follow up'),
    note:reminder.note||'',
    assignedTo:reminder.assignedTo||'All',
    dueDate:reminder.dueDate,
    priority:'medium',
    property:'',
    status:reminder.done?'done':'open',
    createdBy:reminder.createdBy||user,
    createdAt:reminder.createdAt||today(),
    reminderId:reminder.id
  });
}
function renderPlanner(){
  curTab='planner';
  ensureWorkDate();
  const mc=document.getElementById('mc');
  if(!S.tasks)S.tasks=[];
  const mine=isAdmin?S.tasks:S.tasks.filter(t=>t.assignedTo===user||t.assignedTo==='All');
  const openAll=mine.filter(t=>t.status!=='done');
  const open=openAll.filter(t=>t.dueDate?t.dueDate===workDate:workDate===today()).sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
  const done=mine.filter(t=>t.status==='done').slice(0,15);
  const overdue=open.filter(t=>dueKind(t.dueDate)==='overdue').length;
  const selectedDue=openAll.filter(t=>t.dueDate===workDate).length;
  mc.innerHTML=`
  <div class="work-top">
    <div class="work-title">✅ Planner</div>
    <button class="btn btn-orange" onclick="openAddTask()">+ Add Task</button>
  </div>
  ${workDateNavHTML()}
  <div class="work-hero">
    <div class="work-hero-title">${overdue?`⚠️ ${overdue} overdue task${overdue>1?'s':''}`:open.length?`${open.length} open task${open.length>1?'s':''}`:'All tasks cleared'}</div>
    <div class="work-hero-sub">${overdue?'Handle these first.':selectedDue?`${selectedDue} due on this date.`:'Your planner is calm for this date.'}</div>
  </div>
  <div class="work-stats">
    <div class="work-stat"><div class="work-stat-num ora">${open.length}</div><div class="work-stat-lbl">Open</div></div>
    <div class="work-stat"><div class="work-stat-num red">${overdue}</div><div class="work-stat-lbl">Overdue</div></div>
    <div class="work-stat"><div class="work-stat-num grn">${done.length}</div><div class="work-stat-lbl">Done</div></div>
  </div>
  <div class="work-section-title"><span>Tasks For Selected Date</span><span>${open.length}</span></div>
  ${open.length?open.map(t=>taskRowH(t)).join(''):`<div class="empty-soft"><div class="emo">✅</div><div>No open tasks!</div></div>`}
  ${done.length?`<div class="work-section-title"><span>Completed</span><span>${done.length}</span></div>${done.map(t=>taskRowH(t)).join('')}`:''}`; 
}
function taskRowH(t){
  const isDone=t.status==='done',kind=dueKind(t.dueDate,isDone);
  return`<div class="task-item ${isDone?'done-task':kind}">

      </div>
    </div>`;
  }).join('');

}
function setDocTarget(pid,rid,docKey){window._docPid=pid;window._docRid=rid;window._docKey=docKey;document.getElementById('docFileInput').value='';}
async function handleDocUpload(event){
  const pid=window._docPid,rid=window._docRid,docKey=window._docKey;
  if(!pid||!rid||!docKey)return;
  const file=event.target.files[0];if(!file)return;
  if(file.size>800000){toast('❌ File too large — keep under 700KB');return;}
  toast('⏳ Uploading '+file.name+'...',10000);
  const reader=new FileReader();
  reader.onload=async function(e){
    const ok=await saveDocToFS(rid,docKey,e.target.result,file.name,file.type);
    if(ok){
      const p=S.properties.find(x=>x.id===pid),r=((p&&p.rooms)||[]).find(x=>x.id===rid);
      if(!r.docs)r.docs={};
      r.docs[docKey]={name:file.name,size:file.size,mimeType:file.type,uploadedAt:new Date().toISOString()};
      sched();toast('✅ '+file.name+' uploaded!');openDocs(pid,rid);if(vRoom)renderRoomDetail();
    }else{toast('❌ Upload failed. Check connection.');}
  };
  reader.onerror=()=>toast('❌ Could not read file');
  reader.readAsDataURL(file);
}
async function viewDoc(roomId,docKey){
  toast('⏳ Loading...',5000);
  const doc=await loadDocFromFS(roomId,docKey);
  if(!(doc&&doc.data)){toast('❌ Document not found');return;}
  const w=window.open('','_blank');
  if((doc.mimeType&&doc.mimeType.startsWith)('image/')){
    const imgHtml='<ht'+'ml><b'+'ody style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;">'
      +'<img src="'+doc.data+'" style="max-width:100%;max-height:100vh;object-fit:contain;"/>'
      +'</b'+'ody></ht'+'ml>';
    w.document.write(imgHtml);
  }
  else{w.location.href=doc.data;}
  toast('✅ Document opened');
}
async function delDoc(pid,rid,docKey){
  if(!isAdmin){toast('❌ Only admin can delete documents');return;}
  if(!confirm('Remove document?'))return;
  await deleteDocFromFS(rid,docKey);
  const p=S.properties.find(x=>x.id===pid),r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  if(r.docs)delete r.docs[docKey];
  sched();toast('🗑 Removed');openDocs(pid,rid);if(vRoom)renderRoomDetail();
}

function getDistanceMetres(lat1, lng1, lat2, lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function calcHours(rec){
  if(!rec||!rec.checkIn||!rec.checkOut)return'—';
  const diff=(new Date(rec.checkOut)-new Date(rec.checkIn))/3600000;
  const h=Math.floor(diff),m=Math.round((diff-h)*60);
  return h+'h '+(m<10?'0'+m:m)+'m';
}

function setAttStatus(msg,color='var(--muted)'){
  const el=document.getElementById('attStatus');
  if(el){el.textContent=msg;el.style.color=color;}
}

function doCheckIn(){
  if(!navigator.geolocation){toast('❌ Location not supported on this browser');return;}
  setAttStatus('📡 Getting your location...','var(--muted)');
  document.getElementById('attBtn').classList.add('checking');
  document.getElementById('attBtn').disabled=true;

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude;
      const dist=getDistanceMetres(lat,lng,OFFICE_LAT,OFFICE_LNG);
      const mapUrl=`https://www.google.com/maps?q=${lat},${lng}`;

      if(dist>OFFICE_RADIUS_METRES&&!isAdmin){
        setAttStatus(`❌ You are ${Math.round(dist)}m from office. Must be within ${OFFICE_RADIUS_METRES}m to check in.`,'var(--red)');
        document.getElementById('attBtn').classList.remove('checking');
        document.getElementById('attBtn').disabled=false;
        return;
      }

      // Save check-in
      if(!S.attendance)S.attendance=[];
      const td=todayDate();
      // Remove any existing today record for this user (shouldn't happen but safety)
      S.attendance=S.attendance.filter(a=>!(a.date===td&&a.staffName===user));
      S.attendance.push({
        id:uid(),staffName:user,date:td,
        checkIn:nowISO(),checkInTime:nowTime(),
        checkInLat:lat,checkInLng:lng,checkInMapUrl:mapUrl,
        checkInDist:Math.round(dist),
        checkOut:null,checkOutTime:null,checkOutLat:null,checkOutLng:null,checkOutMapUrl:null
      });
      sched();
      toast('✅ Checked in at '+nowTime());
      renderAttendance();
    },
    err=>{
      const msgs={1:'Location permission denied — please allow location access',2:'Location unavailable — try again',3:'Location timed out — try again'};
      setAttStatus('❌ '+(msgs[err.code]||'Location error'),'var(--red)');
      const attBtn=document.getElementById('attBtn');if(attBtn)attBtn.classList.remove('checking');
      if(document.getElementById('attBtn'))document.getElementById('attBtn').disabled=false;
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function doCheckOut(){
  if(!navigator.geolocation){toast('❌ Location not supported');return;}
  setAttStatus('📡 Getting your location...','var(--muted)');
  const btn=document.getElementById('attBtn');
  if(btn){btn.classList.add('checking');btn.disabled=true;}

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude;
      const mapUrl=`https://www.google.com/maps?q=${lat},${lng}`;
      const rec=getTodayRecord();
      if(!rec){toast('❌ No check-in found for today');return;}
      rec.checkOut=nowISO();
      rec.checkOutTime=nowTime();
      rec.checkOutLat=lat;rec.checkOutLng=lng;rec.checkOutMapUrl=mapUrl;
      sched();
      toast('✅ Checked out at '+nowTime()+' · '+calcHours(rec)+' today');
      renderAttendance();
    },
    err=>{
      const msgs={1:'Location permission denied',2:'Location unavailable',3:'Timed out'};
      setAttStatus('❌ '+(msgs[err.code]||'Location error'),'var(--red)');
      const btn=document.getElementById('attBtn');
      if(btn){btn.classList.remove('checking');btn.disabled=false;}
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function saveEditPayment(pid, rid, payId){
  const amt=document.getElementById('epyA').value;
  if(!amt){toast('❌ Enter amount');return;}
  const p=S.properties.find(x=>x.id===pid);
  const r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  const py=((r&&r.payments)||[]).find(x=>x.id===payId);
  if(!py)return;
  py.month=document.getElementById('epyM').value;
  py.amount=Number(amt);
  py.mode=document.getElementById('epyMd').value;
  py.date=document.getElementById('epyD').value;
  py.notes=document.getElementById('epyNote').value;
  // Recalculate balance
  const cm=mk();
  const elec=(r.electricityReadings||[]).find(x=>x.month===cm);
  const bal=getCarryIn(r,cm);
  const due=Number(r.rent||0)+Number((elec&&elec.amount)||0)+bal;
  const totalPaid=(r.payments||[]).filter(x=>x.month===cm).reduce((s,x)=>s+Number(x.amount||0),0);
  setBalanceAfterMonth(r,cm,due-totalPaid);
  sched();closeM();renderRoomDetail();toast('✅ Payment updated');
}

function delPayment(pid, rid, payId){
  if(!confirm('Delete this payment entry? This will also recalculate the balance.'))return;
  const p=S.properties.find(x=>x.id===pid);
  const r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  if(!r)return;
  const py=((r.payments)||[]).find(x=>x.id===payId);
  actLog('Deleted payment — '+(r.tenant&&r.tenant.name?r.tenant.name:'tenant')+' ₹'+((py&&py.amount)||0));
  r.payments=(r.payments||[]).filter(x=>x.id!==payId);
  // Recalculate balance based on current month payments
  const cm=mk();
  const elec=(r.electricityReadings||[]).find(x=>x.month===cm);
  const bal=getCarryIn(r,cm);
  const due=Number(r.rent||0)+Number((elec&&elec.amount)||0)+bal;
  const totalPaid=(r.payments||[]).filter(x=>x.month===cm).reduce((s,x)=>s+Number(x.amount||0),0);
  setBalanceAfterMonth(r,cm,due-totalPaid);
  sched();
  renderRoomDetail();
  toast('🗑 Payment deleted — balance updated');
}

}

function buildMonthlyReportData(month, filterPropId=''){
  const props=[];
  const movements=[];
  const movementKeys=new Set();
  let totalRent=0,totalElec=0,totalCollected=0,totalExp=0,totalRooms=0,occupied=0;
  let moveInRent=0,moveOutDue=0,moveOutCollected=0;

  S.properties.filter(p=>!filterPropId||p.id===filterPropId).forEach(p=>{
    const rooms=(p.rooms||[]);
    totalRooms+=rooms.length;
    const propRooms=[],propExpenses=[];
    let propRent=0,propElec=0,propDed=0,propDue=0,propPaid=0,propPend=0;
    let vacantCount=0;

    rooms.forEach(r=>{
      if(!isRoomOccupied(r)){vacantCount++;return;}
      occupied++;
      const elec=(r.electricityReadings||[]).find(x=>x.month===month);
      const paid=(r.payments||[]).filter(x=>x.month===month).reduce((s,x)=>s+Number(x.amount||0),0);
      const bal=getCarryIn(r,month);
      const activeStart=(r.tenant&&((r.tenant.activeFrom||r.tenant.moveInDate)||''))||'';
      const rent=proratedRentForMonth(r.rent,activeStart,month);
      const elecAmt=Number((elec&&elec.amount)||0);
      const deds=(r.deductions||[]).filter(d=>d.month===month);
      const dedAmt=deds.reduce((s,d)=>s+Number(d.amount||0),0);
      const total=rent+elecAmt+bal-dedAmt;
      const pend=total-paid;
      const secTotal=Number((r.tenant&&(r.tenant.security||r.tenant.securityDeposit))||r.security||0);
      const secBalRaw=(r.tenant&&r.tenant.securityBalance!=null)?r.tenant.securityBalance:r.securityBalance;
      const secBal=secBalRaw!=null?Number(secBalRaw||0):null;
      const storedToken=Number((r.tenant&&(r.tenant.tokenAmount||r.tenant.tokenReceived||r.tenant.token))||0);
      const inferredToken=(!storedToken&&sameMonthDate(activeStart,month)&&secTotal>0&&secBal!=null)?Math.max(0,secTotal-secBal):0;
      const tokenAmount=storedToken||inferredToken;
      const paymentDetails=(r.payments||[])
        .filter(x=>x.month===month)
        .map(x=>(x.mode||'Payment')+(x.date?' '+fd(x.date):'')+(x.notes?' - '+x.notes:''))
        .join('<br/>');

      const elecOld=elec?elec.oldReading:null;
      const elecNew=elec?elec.reading:null;
      const elecUnits=elec?elec.units:null;
      const elecRate=elec?Number(elec.rate||0):null;

      const closingBal=Math.max(0,pend);
      propRooms.push({unit:r.type+(r.unitNo?' #'+r.unitNo:''),tenant:r.tenant.name,phone:(r.tenant&&r.tenant.phone)||'',rent,elec:elecAmt,elecOld,elecNew,elecUnits,elecRate,deds,dedAmt,total,paid,pend,closingBal,carryIn:bal,bal,tokenAmount,securityBalance:secBal,tokenDate:(r.tenant&&r.tenant.tokenDate)||'',paymentDetails});
      propRent+=rent;propElec+=elecAmt;propDed+=dedAmt;propDue+=total;propPaid+=paid;propPend+=pend;
    });

    // Vacated tenants this month
    (S.pastTenants||[])
      .filter(t=>(!filterPropId||t.propertyId===p.id)&&sameMonthDate(t.vacatingDate,month))
      .forEach(t=>{
        const moveKey=[
          'vacated',
          t.propertyId||p.id||'',
          t.roomId||'',
          t.unitNo||'',
          (t.name||'').trim().toLowerCase(),
          t.moveInDate||'',
          t.vacatingDate||''
        ].join('|');
        if(movementKeys.has(moveKey))return;
        movementKeys.add(moveKey);
        const monthPaid=(t.paymentHistory||[]).filter(x=>x.month===month).reduce((s,x)=>s+Number(x.amount||0),0);
        const rent=Number(t.rentAmount||0);
        const settlementDue=Number(t.settlement&&t.settlement.rentPending!=null?t.settlement.rentPending:rent);
        const grossDue=settlementDue+monthPaid;
        movements.push({
          kind:'vacated',
          unit:(t.roomType||'')+(t.unitNo?' #'+t.unitNo:''),
          tenant:t.name||'—',
          start:t.moveInDate||'',
          end:t.vacatingDate||'',
          rent,
          due:grossDue,
          paid:monthPaid,
          pending:settlementDue,
          reason:t.vacatingReason||'—',
          status:t.settlement&&t.settlement.refundStatus||'na',
        });
        moveOutDue+=settlementDue;
        moveOutCollected+=monthPaid;
      });

    // Pre-booked future tenants for this month
    rooms.forEach(r=>{
      const bk=roomBookingInfo(r);
      if(!bk||isRoomOccupied(r))return;
      if(!sameMonthDate(bk.moveInDate,month))return;
      const moveKey=[
        'prebooked',
        p.id||'',
        r.id||'',
        r.unitNo||'',
        (bk.name||'').trim().toLowerCase(),
        bk.moveInDate||''
      ].join('|');
      if(movementKeys.has(moveKey))return;
      movementKeys.add(moveKey);
      const rent=proratedRentForMonth(bk.agreedRent||r.rent||0,bk.moveInDate,month);
      const secBal=bk.securityBalance!=null?bk.securityBalance:Math.max(0,Number(bk.securityDeposit||0)-Number(bk.amount||0));
      movements.push({
        kind:'prebooked',
        unit:r.type+(r.unitNo?' #'+r.unitNo:''),
        tenant:bk.name||'—',
        start:bk.moveInDate||'',
        end:'',
        rent,
        token:Number(bk.amount||0),
        securityBalance:secBal,
        due:rent,
        paid:0,
        pending:rent,
        status:'pending',
      });
      moveInRent+=rent;
    });

    // Property expenses for this month
    (S.expenses||[]).filter(e=>e.propertyId===p.id&&e.month===month).forEach(exp=>{
      (exp.items||[]).forEach(i=>{
        propExpenses.push({desc:i.desc,amount:Number(i.amount||0)});
        totalExp+=Number(i.amount||0);
      });
    });

    totalRent+=propRent;totalElec+=propElec;totalCollected+=propPaid;

    if(propRooms.length||propExpenses.length){
      props.push({name:p.name,address:p.address||'',rooms:propRooms,vacantCount,expenses:propExpenses,totalRent:propRent,totalElec:propElec,totalDed:propDed,totalDue:propDue,totalPaid:propPaid,totalPend:propPend});
    }
  });

  // Other expenses (no property)
  (S.expenses||[]).filter(e=>!e.propertyId&&e.month===month).forEach(exp=>{
    (exp.items||[]).forEach(i=>totalExp+=Number(i.amount||0));
  });

  return{props,movements,totalRent,totalElec,totalCollected,totalExp,totalRooms,occupied,moveInRent,moveOutDue,moveOutCollected};
}

  if(shareMode){
    if(await shareMonthlyReportPdfMake(month,filterPropId))return;
    if(await shareReportPdfBlob(html,'KDC-Report-'+month))return;
  }

  // Mobile-safe: open a printable page, then trigger the browser print/PDF flow.
  try{
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const w=window.open(url,'_blank');
    if(w){
      setTimeout(()=>{try{w.print();}catch(e){}},900);
      toast('📄 Choose Save as PDF or Share in the print screen',5000);
    }else{
      const a=document.createElement('a');
      a.href=url;a.target='_blank';a.rel='noopener';

      toast('📄 Opened printable report — use browser Print / Save as PDF',5000);
    }
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){
    const w=window.open('','_blank');
    if(w){w.document.write(html);w.document.close();}
    else toast('❌ Allow popups in browser settings');
  }
}

function saveDeduction(pid, rid){
  const amt=document.getElementById('dedA').value;
  const desc=document.getElementById('dedDesc').value.trim();
  if(!amt){toast('❌ Enter amount');return;}
  if(!desc){toast('❌ Enter description');return;}
  const p=S.properties.find(x=>x.id===pid);
  const r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  if(!r.deductions)r.deductions=[];
  const mo=document.getElementById('dedM').value;
  r.deductions.push({
    id:uid(),month:mo,
    amount:Number(amt),
    desc,
    note:document.getElementById('dedNote').value,
    addedBy:user,date:today()
  });
  // Recalculate balance
  const elec=(r.electricityReadings||[]).find(x=>x.month===mo);
  const dedTotal=r.deductions.filter(d=>d.month===mo).reduce((s,d)=>s+Number(d.amount||0),0);
  const carryIn3=getCarryIn(r,mo);
  const due=Number(r.rent||0)+Number((elec&&elec.amount)||0)+carryIn3-dedTotal;
  const totalPaid=(r.payments||[]).filter(x=>x.month===mo).reduce((s,x)=>s+Number(x.amount||0),0);
  setBalanceAfterMonth(r,mo,due-totalPaid);
  sched();closeM();
  if(curTab==='billing')renderBilling();
  else if(vRoom)renderRoomDetail();
  toast('✅ Deduction saved — rent reduced by '+fm(amt));
}
