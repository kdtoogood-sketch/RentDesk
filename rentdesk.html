function calcVacateRefund(){
  const sec=Number(document.getElementById('vs_sec').value||0);
  const dues=Number(document.getElementById('vs_dues').value||0);
  const clean=Number(document.getElementById('vs_clean').value||0);
  const damage=Number(document.getElementById('vs_damage').value||0);
  const other=Number(document.getElementById('vs_other').value||0);
  const secAdj=Number(document.getElementById('vs_secadj').value||0);
  const cashPaid=Number(document.getElementById('vs_cashpaid').value||0);
  const totalDues=dues+clean+damage+other;
  const totalPaid=secAdj+cashPaid;
  const secLeft=Math.max(0,sec-secAdj); // security remaining to refund
  const balance=secLeft-(totalDues-cashPaid-secAdj); // positive = we owe tenant, negative = tenant owes us

  // Simpler: finalBalance = sec - totalDues + cashPaid
  // if positive: refund secLeft to tenant (dues covered by cash+secAdj, leftover sec returned)
  // if negative: tenant still owes
  const net=sec-totalDues+cashPaid; // >0 means refund to tenant, <0 means tenant owes

  document.getElementById('vs_r_sec').textContent='₹'+sec.toLocaleString('en-IN');
  document.getElementById('vs_r_ded').textContent='₹'+totalDues.toLocaleString('en-IN');
  document.getElementById('vs_r_secadj').textContent='₹'+secAdj.toLocaleString('en-IN');
  document.getElementById('vs_r_cash').textContent='₹'+cashPaid.toLocaleString('en-IN');
  document.getElementById('vs_r_secleft').textContent='₹'+secLeft.toLocaleString('en-IN');
  const netEl=document.getElementById('vs_r_net');
  if(net>0){
    netEl.textContent='₹'+net.toLocaleString('en-IN')+' to refund to tenant';
    netEl.style.color='var(--green)';
    document.getElementById('vs_r_explain').textContent='We still need to return ₹'+net.toLocaleString('en-IN')+' to '+' the tenant.';
  } else if(net<0){
    netEl.textContent='₹'+Math.abs(net).toLocaleString('en-IN')+' tenant still owes';
    netEl.style.color='var(--red)';
    document.getElementById('vs_r_explain').textContent='Tenant needs to pay ₹'+Math.abs(net).toLocaleString('en-IN')+' more.';
  } else {
    netEl.textContent='✓ Fully settled';
    netEl.style.color='var(--green)';
    document.getElementById('vs_r_explain').textContent='Account fully settled.';
  }
}

function confirmVacating(pid,rid){
  const p=S.properties.find(x=>x.id===pid),r=((p&&p.rooms)||[]).find(x=>x.id===rid);
  if(!r||!p)return;

  const dues=Number(document.getElementById('vs_dues').value||0);
  const clean=Number(document.getElementById('vs_clean').value||0);

  // Archive tenant
  if(!S.pastTenants)S.pastTenants=[];
  const cm=mk();
  const totalRentCollected=(r.payments||[]).reduce((s,x)=>s+Number(x.amount||0),0);
  const pastRecord={
    id:uid(),
    propertyId:pid,
    propertyName:p.name,
    roomId:rid,
    roomType:r.type,
    unitNo:r.unitNo||'',
    name:r.tenant&&r.tenant.name||'',
    phone:r.tenant&&r.tenant.phone||'',
    aadhaar:r.tenant&&r.tenant.aadhaar||'',
    address:r.tenant&&r.tenant.address||'',
    fatherName:r.tenant&&r.tenant.fatherName||'',
    moveInDate:r.tenant&&r.tenant.moveInDate||'',
    vacatingDate:vDate,
    vacatingReason:reason,
    rentAmount:Number(r.rent||0),
    securityHeld:sec,
    totalRentCollected,
    settlement:{
      rentPending:dues,
      cleaningCharge:clean,
      damageDeductions:damage,
      otherDeductions:other,
      totalDeductions:totalDed,
      securityAdjusted:secAdj,
      cashPaidOnDay:cashPaid,
      paymentMode:payMode,
      netRefund,
      balanceStatus:netRefund>0?'refund_pending':netRefund<0?'payment_pending':'settled',
      refundStatus:netRefund>0?'pending':netRefund<0?'owed':'na',
      refundDate:null,
      refundNote:''
    },
    paymentHistory:[...(r.payments||[])],
    electricityHistory:[...(r.electricityReadings||[])],
    deductionHistory:[...(r.deductions||[])],
    notes:note,
    archivedBy:user,
    archivedAt:today()
  };
  const dupIdx=S.pastTenants.findIndex(t=>
    (t.propertyId||'')===pid&&
    (t.roomId||'')===rid&&
    (t.vacatingDate||'')===vDate&&
    ((t.name||'').trim().toLowerCase())===((pastRecord.name||'').trim().toLowerCase())&&
    (t.moveInDate||'')===(pastRecord.moveInDate||'')
  );
  if(dupIdx>=0)S.pastTenants[dupIdx]={...S.pastTenants[dupIdx],...pastRecord,id:S.pastTenants[dupIdx].id||pastRecord.id};
  else S.pastTenants.push(pastRecord);

  // Clear room
  r.tenant=null;
  r.notice=null;
  r.balance=0;
  r.payments=[];
  r.electricityReadings=[];
  r.deductions=[];

  sched();
  closeM();

  // Step 2 — prompt for new tenant
  const hasToken=!!r.token;
  setTimeout(()=>{
    openM('✅ Vacated Successfully',`

        <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Settlement confirmed. ${netRefund>0?'Refund of ₹'+netRefund.toLocaleString('en-IN')+' pending.':netRefund<0?'Tenant owes ₹'+Math.abs(netRefund).toLocaleString('en-IN'):''}</div>
        ${hasToken?`<div style="background:var(--orange-dim);border:1px solid var(--orange);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;text-align:left;">
          <strong>🔑 Token exists:</strong> ${r.token.name} is ready to move in on ${fd(r.token.moveInDate)}.
          Token of ₹${Number(r.token.amount||0).toLocaleString('en-IN')} will be adjusted against security deposit.
        </div>`:''}

function numToWords(n){
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  n=parseInt(n||0);
  if(!n||isNaN(n))return'';
  if(n>=10000000)return numToWords(Math.floor(n/10000000))+' Crore '+(n%10000000?numToWords(n%10000000):'');
  if(n>=100000)return numToWords(Math.floor(n/100000))+' Lakh '+(n%100000?numToWords(n%100000):'');
  if(n>=1000)return numToWords(Math.floor(n/1000))+' Thousand '+(n%1000?numToWords(n%1000):'');
  if(n>=100)return numToWords(Math.floor(n/100))+' Hundred '+(n%100?numToWords(n%100):'');
  if(n>=20)return tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');
  return ones[n];
}
function toWords(n){const w=numToWords(n).trim();return w?w+' Only':'';}

function _compressStampImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=1200;
        const scale=Math.min(1,max/Math.max(img.width,img.height));
        const canvas=document.createElement('canvas');
        canvas.width=Math.max(1,Math.round(img.width*scale));
        canvas.height=Math.max(1,Math.round(img.height*scale));
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.78));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
async function _handleStampFile(input){
  const file=input&&input.files&&input.files[0];
  if(!file)return;
  const okTypes=['application/pdf','image/jpeg','image/png','image/webp'];
  const isPdf=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  if(!okTypes.includes(file.type)&&!isPdf){toast('❌ Please attach PDF, JPG, PNG, or WEBP');input.value='';return;}
  toast('⏳ Processing stamp paper...',4000);
  try{
    let data='';
    let type='image/jpeg';
    if(isPdf){
      if(!window.pdfjsLib){
        await new Promise((resolve,reject)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          s.onload=resolve;s.onerror=reject;
          document.head.appendChild(s);
        });
        window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const ab=await file.arrayBuffer();
      const pdf=await window.pdfjsLib.getDocument({data:ab}).promise;
      const page=await pdf.getPage(1);
      const vp=page.getViewport({scale:2.5});
      const canvas=document.createElement('canvas');
      canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      data=canvas.toDataURL('image/jpeg',0.92);
    }else{
      data=await _compressStampImage(file);
    }
    if(data.length>1200000){toast('❌ Stamp file is too large after processing. Please use a smaller file.');input.value='';return;}
    const L={..._collectLease(),stampPaper:'file',stampFileName:file.name,stampFileType:type,stampFileData:data};
    _leaseDraftBase={...L};
    _buildLeaseForm(L);
    _renderDeed(L);
    toast('✅ Stamp paper attached. Press Save to keep it with this lease.');
  }catch(e){
    console.error(e);
    toast('❌ Could not attach stamp paper');
  }
}

function saveLease(){
  if(!S.leases)S.leases=[];
  const L=_collectLease();
  if(!L.lesseeName){toast('❌ Lessee name is required');return;}
  if(!L.agrDate){toast('❌ Agreement date is required');return;}
  const wasEdit=!!_curLeaseId;
  if(_curLeaseId){
    const idx=S.leases.findIndex(x=>x.id===_curLeaseId);
    if(idx>=0){S.leases[idx]={...S.leases[idx],...L,id:_curLeaseId};}
    else{L.id=_curLeaseId;S.leases.push(L);}
  } else {
    const newId=uid();
    _curLeaseId=newId;
    L.id=newId;
    L.createdAt=today();L.createdBy=user;
    if(!L.status)L.status='active';
    S.leases.push(L);
  }
  const saved=(S.leases||[]).find(x=>x.id===_curLeaseId)||L;
  _leaseDraftBase={...saved};
  try{localStorage.setItem('rentdesk_backup',JSON.stringify(S));localStorage.setItem('rentdesk_backup_time',Date.now());}catch(e){}
  sched();
  actLog((wasEdit?'Lease edited — ':'Lease created — ')+L.lesseeName);
  toast('✅ Lease saved');
}

// ── LEASE DEED (Part 7 — renewLease) ──
function renewLease(leaseId){
  if(!S.leases)S.leases=[];
  const old=S.leases.find(x=>x.id===leaseId);
  if(!old)return;
  const origEsc=parseInt(old.escalation)||10;
  const oldRent=parseInt(old.rentAmt)||0;
  const calcedRent=Math.round(oldRent*(1+origEsc/100));
  // Show escalation confirmation modal first
  openM('🔄 Confirm Renewal Escalation',`
    <div style="background:#EFF6FF;border:1.5px solid var(--blue);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--blue);">
      <div style="font-weight:700;margin-bottom:4px;">📋 Original Agreement</div>
      <div>Agreed escalation: <strong>${origEsc}%</strong></div>
      <div>Previous rent: <strong>₹${oldRent.toLocaleString('en-IN')}</strong></div>
      <div>Calculated new rent: <strong>₹${calcedRent.toLocaleString('en-IN')}</strong></div>
    </div>
    <div class="frow1">
      <label class="flabel">What escalation % was actually settled?</label>
      <input class="finput" id="renewEscPct" type="number" value="${origEsc}" min="0" max="100" step="0.5"
        oninput="
          const pct=parseFloat(this.value||0);
          const nr=Math.round(${oldRent}*(1+pct/100));
          const el=document.getElementById('renewNewRentPreview');
          if(el)el.textContent='₹'+nr.toLocaleString('en-IN');
        "/>
    </div>
    <div style="background:var(--orange-dim);border:1px solid rgba(249,115,22,0.3);border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;color:var(--orange);font-weight:600;">New rent will be:</span>
      <span id="renewNewRentPreview" style="font-family:'Space Grotesk';font-size:20px;font-weight:700;color:var(--orange);">₹${calcedRent.toLocaleString('en-IN')}</span>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button>
     <button class="btn btn-orange" onclick="applyRenewal('${leaseId}')">Apply &amp; Continue →</button>`
  );
}
function applyRenewal(leaseId){
  const enteredPct=parseFloat((document.getElementById('renewEscPct')||{}).value||0);
  closeM();
  if(!S.leases)S.leases=[];
  const old=S.leases.find(x=>x.id===leaseId);
  if(!old)return;
  // Mark old as renewed
  old.status='renewed';
  // Calc new dates
  let newStart=old.leaseEnd;
  if(newStart){
    const d=new Date(newStart+'T00:00:00');d.setDate(d.getDate()+1);
    newStart=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  const ten=parseInt(old.leaseTenure==='custom'?old.customTenure:old.leaseTenure)||11;
  let newEnd='';
  if(newStart){
    const d=new Date(newStart+'T00:00:00');d.setMonth(d.getMonth()+ten);d.setDate(d.getDate()-1);
    newEnd=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  const oldRent=parseInt(old.rentAmt)||0;
  const newRent=Math.round(oldRent*(1+enteredPct/100));
  // Build renewal record
  const newL={...old,id:null,status:'active',renewedFrom:leaseId,renewalCount:(old.renewalCount||0)+1,
    leaseStart:newStart,leaseEnd:newEnd,
    rentAmt:String(newRent),rentWords:toWords(newRent),
    settledEscalation:enteredPct,
    createdAt:today(),createdBy:user};
  _isRenewal=true;_renewalOldRent=oldRent;_renewalEsc=enteredPct;_curLeaseId=null;
  actLog('Lease renewed — '+old.lesseeName+' new rent ₹'+newRent.toLocaleString('en-IN')+' ('+enteredPct+'%)');
  sched();
  // Open overlay with pre-filled renewal
  const ov=document.getElementById('leaseOverlay');
  document.getElementById('loTitle').textContent='Renewal — '+old.lesseeName;
  const banner=document.getElementById('renewalBanner');
  banner.style.display='inline-flex';
  banner.innerHTML=`🔄 Renewal #${newL.renewalCount} · Prev rent: ₹${oldRent.toLocaleString('en-IN')} → New: ₹${newRent.toLocaleString('en-IN')} (Settled at ${enteredPct}%)`;
  ov.classList.add('open');
  _leaseDraftBase={...newL};
  _buildLeaseForm(newL);
  // Set new dates and recalc end
  const se=document.getElementById('lf_leaseEnd');if(se)se.value=newEnd;
  _renderDeed(newL);
  toast(`🔄 Renewal opened — rent set to ₹${newRent.toLocaleString('en-IN')} (${enteredPct}%)`);
}
function deleteLease(leaseId){
  if(!confirm('Delete this lease deed?'))return;
  const l=(S.leases||[]).find(x=>x.id===leaseId);
  actLog('Deleted lease — '+(l?l.lesseeName:'unknown'));
  S.leases=(S.leases||[]).filter(x=>x.id!==leaseId);
  sched();renderLease();toast('🗑 Lease deleted');
}

    '*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}',
    'html{width:100%;-webkit-text-size-adjust:100%;}',

    '.deed-wrap{max-width:none!important;width:100%!important;}',
    /* Optional stamp-paper gap: keeps deed text on page 1, about two printed lines below the stamp area */
    '.stamp-space{width:100%;}',
    '.stamp-space-on{display:block !important;height:18mm !important;}',
    '.stamp-space-off{display:none !important;height:0 !important;}',
    '.stamp-file{display:block !important;page-break-inside:avoid !important;break-inside:avoid !important;margin-bottom:8mm !important;}',
    '.stamp-file img,.stamp-file embed{max-width:100% !important;max-height:252mm !important;display:block !important;margin:0 auto !important;object-fit:contain !important;}',
    /* Page setup — single @page rule for all browsers, no @page:first */
    '@page{size:A4 portrait;margin:10mm 18mm 15mm 18mm;}',

  const pv=document.getElementById('loPreview');

// Android / Desktop: html2pdf → PDF download with "Page X of Y" footer
function _pdfPrint(deedEl){
  toast('⏳ Building PDF — please wait...',12000);

  const clone=deedEl.cloneNode(true);
  clone.style.cssText='max-width:none;width:100%;font-size:13px;line-height:1.8;';
  // Activate the optional stamp-space div (hidden on screen, shown here for PDF)
  const ssEl=clone.querySelector('.stamp-space');
  if(ssEl){ssEl.style.cssText=ssEl.classList.contains('stamp-space-on')?'height:18mm;display:block;width:100%;':'height:0;display:none;width:100%;';}

  const wrap=document.createElement('div');
  wrap.style.cssText='position:absolute;left:-9999px;top:0;width:170mm;background:#fff;';
  wrap.appendChild(clone);
  document.body.appendChild(wrap);

  const L=_collectLease();
  const filename=((L.lesseeName||'Lease').replace(/[^a-zA-Z0-9 ]/g,'_').trim()||'Lease')+'_Deed.pdf';

  html2pdf().set({
    margin:[0,18,18,18], // top=0 because stamp space is baked into HTML
    filename:filename,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,logging:false},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(wrap).toPdf().get('pdf').then(function(pdf){
    const n=pdf.internal.getNumberOfPages();
    const pw=pdf.internal.pageSize.getWidth();
    const ph=pdf.internal.pageSize.getHeight();
    for(let i=1;i<=n;i++){
      pdf.setPage(i);
      pdf.setFont('times','normal');
      pdf.setFontSize(9);
      pdf.setTextColor(120,120,120);
      pdf.text('Page '+i+' of '+n, pw/2, ph-6, {align:'center'});
    }
    pdf.save(filename);
    if(document.body.contains(wrap))document.body.removeChild(wrap);
    toast('✅ PDF saved — check Downloads');
  }).catch(function(e){
    if(document.body.contains(wrap))document.body.removeChild(wrap);
    console.error('PDF error:',e);
    toast('⚠️ PDF failed — opening print window');
    // Desktop-only fallback
    const pv=document.getElementById('loPreview');
    if(!pv)return;
    const css=_deedPrintCSS();
    const html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Lease Deed</title><style>'+css+'</style></head><body>'+pv.innerHTML+'<script>setTimeout(function(){window.print();},400);<\/script></body></html>';
    try{const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}else toast('❌ Allow popups to print');}catch(e){toast('❌ Could not open print window');}
  });
}

// ── ROOM SORT HELPER ──
// Sorts rooms by unit number (numeric where possible, alphanumeric fallback)
function sortRooms(rooms){
  return [...(rooms||[])].sort((a,b)=>{
    const ua=String(a.unitNo||''), ub=String(b.unitNo||'');
    const na=Number(ua), nb=Number(ub);
    if(!isNaN(na)&&!isNaN(nb)&&ua!==''&&ub!=='')return na-nb;
    return ua.localeCompare(ub,undefined,{numeric:true,sensitivity:'base'});
  });
}

// Downloads a dated JSON backup of any tab's data.
// Use on the 1st of every month as a manual backup habit.
function exportRentData(tab){
  const dateStr=new Date().toISOString().slice(0,10);
  let payload,filename;
  switch(tab){
    case 'properties':
      payload={exportedAt:new Date().toISOString(),tab:'Properties',
        totalProperties:(S.properties||[]).length,
        totalRooms:(S.properties||[]).reduce((a,p)=>a+(p.rooms||[]).length,0),
        properties:S.properties||[]};
      filename='rentdesk-properties-'+dateStr+'.json'; break;
    case 'expenses':
      payload={exportedAt:new Date().toISOString(),tab:'Expenses',
        totalExpenses:(S.expenses||[]).length,expenses:S.expenses||[]};
      filename='rentdesk-expenses-'+dateStr+'.json'; break;
    case 'cash':
      payload={exportedAt:new Date().toISOString(),tab:'Cash',
        totalEntries:(S.cash||[]).length,cash:S.cash||[]};
      filename='rentdesk-cash-'+dateStr+'.json'; break;
    case 'leases':
      payload={exportedAt:new Date().toISOString(),tab:'Leases',
        totalLeases:(S.leases||[]).length,leases:S.leases||[]};
      filename='rentdesk-leases-'+dateStr+'.json'; break;
    case 'full':
      payload={exportedAt:new Date().toISOString(),tab:'Full Backup',data:S};
      filename='rentdesk-full-backup-'+dateStr+'.json'; break;
    default:
      payload={exportedAt:new Date().toISOString(),tab:'Full Backup',data:S};
      filename='rentdesk-full-backup-'+dateStr+'.json';
  }
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('📥 Exported: '+filename);
}

window.onload=()=>{
  billMo=mk();expMo=mk();
  if(!restoreSession())document.getElementById('lPass').focus();
  document.getElementById('docFileInput').addEventListener('change',handleDocUpload);
  // On page close: use sendBeacon for reliable fire-and-forget save
  window.addEventListener('beforeunload',()=>{
    clearTimeout(saveT);
    // Always save to localStorage (synchronous, instant, safe)
    try{localStorage.setItem('rentdesk_backup',JSON.stringify(S));localStorage.setItem('rentdesk_backup_time',Date.now());}catch(e){}
    // SAFETY: Only fire sendBeacon to Firebase if data was confirmed 
    // loaded from Firebase this session. If the page closes before
    // loadData() completed, S could have empty arrays — we must not
    // push that to Firebase or all tenant data would be wiped.
    if(dataLoadedFromFirebase){
      const body=JSON.stringify({fields:{data:{stringValue:JSON.stringify(S)}}});
      if(navigator.sendBeacon){
        const blob=new Blob([body],{type:'application/json'});
        navigator.sendBeacon(FB_URL+'&updateMask.fieldPaths=data',blob);
      }
    }
  });
};

// ── PAST TENANTS ──────────────────────────────────────────────────────────
function renderPast(){
  const mc=document.getElementById('mc');if(!mc)return;
  const all=S.pastTenants||[];
  const srch=(document.getElementById('pastSearch')||{}).value||'';
  const fil=srch?all.filter(t=>(t.name||'').toLowerCase().includes(srch.toLowerCase())||(t.phone||'').includes(srch)):all;
  const byProp={};
  fil.forEach(t=>{const k=t.propertyId||'other';if(!byProp[k])byProp[k]={name:t.propertyName||'Other',list:[]};byProp[k].list.push(t);});
  const pendRef=all.filter(t=>t.settlement&&t.settlement.refundStatus==='pending');
  mc.innerHTML=`
    <div class="page-header">
      <h2 class="page-title">👥 Past Tenants</h2>
      <div class="page-sub">${all.length} archived tenant${all.length!==1?'s':''}</div>
    </div>
    ${pendRef.length?`<div style="background:#FEF3C7;border:1px solid #F59E0B;border-radius:10px;padding:12px 16px;margin-bottom:14px;">
      <strong>💰 ${pendRef.length} Refund${pendRef.length>1?'s':''} Pending</strong>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">${pendRef.map(t=>'₹'+(t.settlement.netRefund||0).toLocaleString('en-IN')+' → '+t.name).join(' · ')}</div>
    </div>`:''}
    <div class="card" style="margin-bottom:14px;">
      <input class="finput" id="pastSearch" placeholder="🔍 Search by name or phone..." oninput="renderPast()" value="${srch}" style="border:none;background:transparent;outline:none;width:100%;"/>
    </div>
    ${Object.keys(byProp).length===0?`<div class="empty-state"><div style="font-size:2.5rem">👥</div><div style="font-weight:600;margin:8px 0 4px">No past tenants yet</div><div style="font-size:13px;color:var(--muted)">Vacated tenants will appear here.</div></div>`:
    Object.values(byProp).map(g=>`
      <div style="background:var(--orange);color:#fff;padding:10px 16px;border-radius:10px 10px 0 0;font-weight:700;font-size:14px;margin-top:14px;">
        🏢 ${g.name} <span style="opacity:.7;font-size:12px;font-weight:400;">(${g.list.length})</span></div>
      ${g.list.sort((a,b)=>b.vacatingDate>a.vacatingDate?1:-1).map(t=>`
        <div class="card" style="border-radius:0;border-top:none;margin-bottom:0;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div><div style="font-weight:700;font-size:15px;">${t.name||'—'}</div>
              <div style="font-size:12px;color:var(--muted);">${t.phone||''} ${t.roomType?'· '+t.roomType+(t.unitNo?' #'+t.unitNo:''):''}</div></div>
            <span class="badge ${t.settlement.balanceStatus==='refund_pending'||t.settlement.refundStatus==='pending'?'badge-red':t.settlement.balanceStatus==='payment_pending'?'badge-amb':t.settlement.balanceStatus==='settled'||t.settlement.refundStatus==='paid'?'badge-grn':'badge-amb'}">
              ${t.settlement.balanceStatus==='refund_pending'||t.settlement.refundStatus==='pending'?'💰 Refund Pending':t.settlement.balanceStatus==='payment_pending'?'⚠️ Tenant Owes':t.settlement.balanceStatus==='settled'||t.settlement.refundStatus==='paid'?'✅ Settled':'Settled'}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:12px;margin-bottom:8px;">
            <div><span style="color:var(--muted)">Tenure:</span> ${fd(t.moveInDate)} → ${fd(t.vacatingDate)}</div>
            <div><span style="color:var(--muted)">Reason:</span> ${t.vacatingReason||'—'}</div>
            <div><span style="color:var(--muted)">Collected:</span> ${fm(t.totalRentCollected||0)}</div>
            <div><span style="color:var(--muted)">Balance:</span> <span style="color:${(t.settlement.netRefund||0)>0?'var(--green)':(t.settlement.netRefund||0)<0?'var(--red)':'var(--green)'};">${(t.settlement.netRefund||0)>0?'We owe '+fm(t.settlement.netRefund):(t.settlement.netRefund||0)<0?'Tenant owes '+fm(Math.abs(t.settlement.netRefund||0)):'✓ Settled'}</span></div>
          </div>
          ${(t.settlement.balanceStatus==='refund_pending'||t.settlement.refundStatus==='pending')?`<button class="btn btn-green btn-sm" onclick="markRefundPaid('${t.id}')">💰 Pay Refund to Tenant</button>`:
            t.settlement.balanceStatus==='payment_pending'?`<button class="btn btn-orange btn-sm" onclick="markRefundPaid('${t.id}')">💰 Receive Payment from Tenant</button>`:''}
          <details style="margin-top:8px;">
            <summary style="font-size:12px;color:var(--orange);cursor:pointer;font-weight:600;">View Full Details ▼</summary>
            <div style="margin-top:10px;font-size:12px;">
              ${t.aadhaar?`<div><b>Aadhaar:</b> ${t.aadhaar}</div>`:''}
              ${t.fatherName?`<div><b>S/O:</b> ${t.fatherName}</div>`:''}
              ${t.address?`<div><b>Address:</b> ${t.address}</div>`:''}
              <div style="font-weight:600;margin:8px 0 5px;">Settlement</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;">
                <div>Security Held:</div><div style="font-weight:600">${fm(t.securityHeld||0)}</div>
                <div>Rent Due:</div><div style="color:var(--red)">${fm(t.settlement.rentPending||0)}</div>
                <div>Cleaning:</div><div style="color:var(--red)">${fm(t.settlement.cleaningCharge||0)}</div>
                ${t.settlement.damageDeductions?`<div>Damage:</div><div style="color:var(--red)">${fm(t.settlement.damageDeductions)}</div>`:''}
                ${t.settlement.otherDeductions?`<div>Other:</div><div style="color:var(--red)">${fm(t.settlement.otherDeductions)}</div>`:''}
                <div style="color:var(--muted)">Security Adjusted:</div><div style="color:var(--orange)">${fm(t.settlement.securityAdjusted||0)}</div>
                <div style="color:var(--muted)">Cash Paid on Day:</div><div style="color:var(--green)">${fm(t.settlement.cashPaidOnDay||0)}${t.settlement.paymentMode?' ('+t.settlement.paymentMode+')':''}</div>
                <div style="font-weight:700;border-top:1px solid var(--border);padding-top:4px">${(t.settlement.netRefund||0)>=0?'We Owe Tenant:':'Tenant Owes Us:'}</div>
                <div style="font-weight:700;border-top:1px solid var(--border);padding-top:4px;color:${(t.settlement.netRefund||0)>0?'var(--green)':(t.settlement.netRefund||0)<0?'var(--red)':'var(--green)'}">
                  ${(t.settlement.netRefund||0)>0?fm(t.settlement.netRefund||0):(t.settlement.netRefund||0)<0?fm(Math.abs(t.settlement.netRefund||0)):'✓ Fully Settled'}</div>
              </div>
              ${t.notes?`<div style="margin-top:6px"><b>Notes:</b> ${t.notes}</div>`:''}
              ${(t.paymentHistory||[]).length?`
                <div style="font-weight:600;margin:8px 0 5px">Payment History</div>
                ${t.paymentHistory.slice(-5).map(p=>`<div style="display:flex;justify-content:space-between;border-bottom:1px solid #F3F4F6;padding:2px 0">
                  <span>${p.month||p.date||''}</span><span style="font-weight:600">${fm(p.amount)}</span></div>`).join('')}`:''}
            </div>
          </details>
        </div>`).join('')}
      <div style="height:8px;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;margin-bottom:2px;"></div>`).join('')}`;
}

function markRefundPaid(pastId){
  const t=(S.pastTenants||[]).find(x=>x.id===pastId);if(!t)return;
  const isRefund=(t.settlement.netRefund||0)>=0;
  const amt=Math.abs(t.settlement.netRefund||0);
  openM(isRefund?'💰 Pay Refund to Tenant':'💰 Receive Payment from Tenant',`
    <div style="text-align:center;padding:8px 0 16px;">
      <div style="font-size:1.6rem;font-weight:700;color:${isRefund?'var(--green)':'var(--red)'};">${fm(amt)}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px;">${isRefund?'Refund to '+t.name:'Pending from '+t.name}</div>
    </div>
    <div class="frow1"><label class="flabel">${isRefund?'Refund Date':'Payment Received Date'}</label>
      <input class="finput" type="date" id="rf_date" value="${today()}"/></div>
    <div class="frow1"><label class="flabel">Payment Mode</label>
      <select class="fselect" id="rf_mode"><option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Cheque</option></select></div>
    <div class="frow1"><label class="flabel">Notes (optional)</label>
      <input class="finput" id="rf_note" placeholder="Reference no., remarks etc."/></div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button>
     <button class="btn ${isRefund?'btn-green':'btn-orange'}" onclick="saveRefundPaid('${pastId}')">✅ Mark as ${isRefund?'Refund Paid':'Payment Received'}</button>`);
}

function saveRefundPaid(pastId){
  const t=(S.pastTenants||[]).find(x=>x.id===pastId);if(!t)return;
  t.settlement.refundStatus='paid';
  t.settlement.balanceStatus='settled';
  t.settlement.refundDate=document.getElementById('rf_date').value||today();
  t.settlement.refundMode=(document.getElementById('rf_mode')||{}).value||'';
  t.settlement.refundNote=document.getElementById('rf_note').value;
  sched();closeM();renderPast();renderDash();
  const isRefund=(t.settlement.netRefund||0)>=0;
  toast(isRefund?'✅ Refund paid to tenant':'✅ Payment received from tenant');
}
