// ── LEASE DEED (Part 6 — saveLease) ──
function saveLease(){
  if(!S.leases)S.leases=[];
  const L=_collectLease();
  if(!L.lesseeName){toast('❌ Lessee name is required');return;}
  if(!L.agrDate){toast('❌ Agreement date is required');return;}
  if(_curLeaseId){
    const idx=S.leases.findIndex(x=>x.id===_curLeaseId);
    if(idx>=0){S.leases[idx]={...S.leases[idx],...L,id:_curLeaseId};}
  } else {
    const newId=uid();
    _curLeaseId=newId;
    L.id=newId;
    L.createdAt=today();L.createdBy=user;
    if(!L.status)L.status='active';
    S.leases.push(L);
  }
  sched();
  actLog(_curLeaseId&&_curLeaseId!==L.id?'Lease edited — '+L.lesseeName:'Lease created — '+L.lesseeName);
  toast('✅ Lease saved');
}

// ── LEASE DEED (Part 7 — renewLease) ──
function renewLease(leaseId){
  if(!S.leases)S.leases=[];
  const old=S.leases.find(x=>x.id===leaseId);
  if(!old)return;
  const origEsc=parseInt(old.escalation)||10;
  const oldRent=parseInt(old.rentAmt)||0;
  const calcedRent=Math.round(oldRent*(1+origEsc/100));
  // Show escalation confirmation modal first
  openM('🔄 Confirm Renewal Escalation',`
    <div style="background:#EFF6FF;border:1.5px solid var(--blue);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--blue);">
      <div style="font-weight:700;margin-bottom:4px;">📋 Original Agreement</div>
      <div>Agreed escalation: <strong>${origEsc}%</strong></div>
      <div>Previous rent: <strong>₹${oldRent.toLocaleString('en-IN')}</strong></div>
      <div>Calculated new rent: <strong>₹${calcedRent.toLocaleString('en-IN')}</strong></div>
    </div>
    <div class="frow1">
      <label class="flabel">What escalation % was actually settled?</label>
      <input class="finput" id="renewEscPct" type="number" value="${origEsc}" min="0" max="100" step="0.5"
        oninput="
          const pct=parseFloat(this.value||0);
          const nr=Math.round(${oldRent}*(1+pct/100));
          const el=document.getElementById('renewNewRentPreview');
          if(el)el.textContent='₹'+nr.toLocaleString('en-IN');
        "/>
    </div>
    <div style="background:var(--orange-dim);border:1px solid rgba(249,115,22,0.3);border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;color:var(--orange);font-weight:600;">New rent will be:</span>
      <span id="renewNewRentPreview" style="font-family:'Space Grotesk';font-size:20px;font-weight:700;color:var(--orange);">₹${calcedRent.toLocaleString('en-IN')}</span>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button>
     <button class="btn btn-orange" onclick="applyRenewal('${leaseId}')">Apply &amp; Continue →</button>`
  );
}
function applyRenewal(leaseId){
  const enteredPct=parseFloat((document.getElementById('renewEscPct')||{}).value||0);
  closeM();
  if(!S.leases)S.leases=[];
  const old=S.leases.find(x=>x.id===leaseId);
  if(!old)return;
  // Mark old as renewed
  old.status='renewed';
  // Calc new dates
  let newStart=old.leaseEnd;
  if(newStart){
    const d=new Date(newStart+'T00:00:00');d.setDate(d.getDate()+1);
    newStart=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  const ten=parseInt(old.leaseTenure)||11;
  let newEnd='';
  if(newStart){
    const d=new Date(newStart+'T00:00:00');d.setMonth(d.getMonth()+ten);d.setDate(d.getDate()-1);
    newEnd=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  const oldRent=parseInt(old.rentAmt)||0;
  const newRent=Math.round(oldRent*(1+enteredPct/100));
  // Build renewal record
  const newL={...old,id:null,status:'active',renewedFrom:leaseId,renewalCount:(old.renewalCount||0)+1,
    leaseStart:newStart,leaseEnd:newEnd,
    rentAmt:String(newRent),rentWords:toWords(newRent),
    settledEscalation:enteredPct,
    createdAt:today(),createdBy:user};
  _isRenewal=true;_renewalOldRent=oldRent;_renewalEsc=enteredPct;_curLeaseId=null;
  actLog('Lease renewed — '+old.lesseeName+' new rent ₹'+newRent.toLocaleString('en-IN')+' ('+enteredPct+'%)');
  sched();
  // Open overlay with pre-filled renewal
  const ov=document.getElementById('leaseOverlay');
  document.getElementById('loTitle').textContent='Renewal — '+old.lesseeName;
  const banner=document.getElementById('renewalBanner');
  banner.style.display='inline-flex';
  banner.innerHTML=`🔄 Renewal #${newL.renewalCount} · Prev rent: ₹${oldRent.toLocaleString('en-IN')} → New: ₹${newRent.toLocaleString('en-IN')} (Settled at ${enteredPct}%)`;
  ov.classList.add('open');
  _buildLeaseForm(newL);
  // Set new dates and recalc end
  const se=document.getElementById('lf_leaseEnd');if(se)se.value=newEnd;
  _renderDeed(newL);
  toast(`🔄 Renewal opened — rent set to ₹${newRent.toLocaleString('en-IN')} (${enteredPct}%)`);
}
function deleteLease(leaseId){
  if(!confirm('Delete this lease deed?'))return;
  const l=(S.leases||[]).find(x=>x.id===leaseId);
  actLog('Deleted lease — '+(l?l.lesseeName:'unknown'));
  S.leases=(S.leases||[]).filter(x=>x.id!==leaseId);
  sched();renderLease();toast('🗑 Lease deleted');
}

    '.deed-cl{font-weight:700;text-decoration:underline;display:block;margin:16px 0 8px;}',
    '.deed-pg{page-break-before:always;}',
    /* Avoid flex in print — iOS/Safari breaks multi-column flex across pages */
    '.deed-sig{display:table !important;table-layout:fixed;width:100%;margin-top:48px;}',
    '.deed-sig-blk{display:table-cell !important;width:50%;text-align:center;border-top:1px solid #333;padding-top:8px;font-size:11pt;vertical-align:top;}',
    '.deed-wit{display:table !important;table-layout:fixed;width:100%;margin-bottom:32px;}',
    '.deed-wit-blk{display:table-cell !important;width:50%;border-top:1px solid #333;padding-top:6px;font-size:11pt;vertical-align:top;}',
    '.deed-wrap{max-width:none!important;width:100%!important;}',
    /* stamp-space: 125mm blank block for stamp paper — works on all browsers */
    '.stamp-space{display:block !important;height:125mm;width:100%;}',
    /* Page setup — single @page rule for all browsers, no @page:first */
    '@page{size:A4 portrait;margin:10mm 18mm 15mm 18mm;}',
    /* Page numbers — works in Firefox/Edge; Chrome users see them via Headers & Footers */
    '@page{@bottom-center{content:"Page " counter(page) " of " counter(pages);font-family:"Times New Roman",serif;font-size:9pt;color:#777;}}',
  ].join('');
}

function printLeaseDeed(){
  const pv=document.getElementById('loPreview');
  if(!pv){toast('No deed to print');return;}
  const deedEl=pv.querySelector('.deed-wrap');
  if(!deedEl){toast('No deed content to print');return;}

  const printZone=document.getElementById('printZone');
  if(!printZone){toast('❌ Print zone missing');return;}
  printZone.innerHTML='';
  const clone=deedEl.cloneNode(true);
  clone.style.maxWidth='none';
  clone.style.width='100%';
  clone.style.margin='0';
  const ss=clone.querySelector('.stamp-space');
  if(ss)ss.style.display='block';
  printZone.appendChild(clone);

  // Keep the print DOM in place after calling print. Android Chrome can fire
  // afterprint before the PDF preview captures the page, causing a blank PDF.
  printZone.style.display='';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      try{
        window.focus();
        window.print();
      }catch(e){
        printZone.innerHTML='';
        toast('❌ Print failed to open');
        console.error(e);
      }
    });
  });
  toast('📄 Opening print dialog');
}

// Android / Desktop: html2pdf → PDF download with "Page X of Y" footer
function _pdfPrint(deedEl){
  toast('⏳ Building PDF — please wait...',12000);

  const clone=deedEl.cloneNode(true);
  clone.style.cssText='max-width:none;width:100%;font-size:13px;line-height:1.8;';
  // Activate the stamp-space div (hidden on screen, shown here for PDF)
  const ssEl=clone.querySelector('.stamp-space');
  if(ssEl){ssEl.style.cssText='height:110mm;display:block;width:100%;';}

  const wrap=document.createElement('div');
  wrap.style.cssText='position:absolute;left:-9999px;top:0;width:170mm;background:#fff;';
  wrap.appendChild(clone);
  document.body.appendChild(wrap);

  const L=_collectLease();
  const filename=((L.lesseeName||'Lease').replace(/[^a-zA-Z0-9 ]/g,'_').trim()||'Lease')+'_Deed.pdf';

  html2pdf().set({
    margin:[0,18,18,18], // top=0 because stamp space is baked into HTML
    filename:filename,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,logging:false},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(wrap).toPdf().get('pdf').then(function(pdf){
    const n=pdf.internal.getNumberOfPages();
    const pw=pdf.internal.pageSize.getWidth();
    const ph=pdf.internal.pageSize.getHeight();
    for(let i=1;i<=n;i++){
      pdf.setPage(i);
      pdf.setFont('times','normal');
      pdf.setFontSize(9);
      pdf.setTextColor(120,120,120);
      pdf.text('Page '+i+' of '+n, pw/2, ph-6, {align:'center'});
    }
    pdf.save(filename);
    if(document.body.contains(wrap))document.body.removeChild(wrap);
    toast('✅ PDF saved — check Downloads');
  }).catch(function(e){
    if(document.body.contains(wrap))document.body.removeChild(wrap);
    console.error('PDF error:',e);
    toast('⚠️ PDF failed — opening print window');
    // Desktop-only fallback
    const pv=document.getElementById('loPreview');
    if(!pv)return;
    const css=_deedPrintCSS();
    const html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Lease Deed</title><style>'+css+'</style></head><body>'+pv.innerHTML+'<script>setTimeout(function(){window.print();},400);<\/script></body></html>';
    try{const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}else toast('❌ Allow popups to print');}catch(e){toast('❌ Could not open print window');}
  });
}

// ── ROOM SORT HELPER ──
// Sorts rooms by unit number (numeric where possible, alphanumeric fallback)
function sortRooms(rooms){
  return [...(rooms||[])].sort((a,b)=>{
    const ua=String(a.unitNo||''), ub=String(b.unitNo||'');
    const na=Number(ua), nb=Number(ub);
    if(!isNaN(na)&&!isNaN(nb)&&ua!==''&&ub!=='')return na-nb;
    return ua.localeCompare(ub,undefined,{numeric:true,sensitivity:'base'});
  });
}
