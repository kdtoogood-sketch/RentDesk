<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RentDesk — KDC Infra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F6FA;--white:#FFFFFF;--orange:#F97316;--orange2:#EA6A0A;
  --orange-dim:rgba(249,115,22,0.08);--orange-mid:rgba(249,115,22,0.15);
  --ink:#1A1A1A;--ink2:#555555;--muted:#9CA3AF;--border:#E8ECF0;
  --red:#EF4444;--red-dim:rgba(239,68,68,0.1);
  --green:#10B981;--green-dim:rgba(16,185,129,0.1);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.1);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,0.1);
  --purple:#8B5CF6;--purple-dim:rgba(139,92,246,0.1);
  --shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-md:0 4px 24px rgba(0,0,0,0.1);--r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:'Inter',sans-serif;}
button{cursor:pointer;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-wrap{width:100%;max-width:380px;}
.login-logo{margin-bottom:32px;text-align:center;}
.login-brand-small{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.login-brand{font-family:'Space Grotesk';font-size:32px;font-weight:700;color:var(--ink);}
.login-brand span{color:var(--orange);}
.login-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow-md);padding:32px;}
.login-title{font-family:'Space Grotesk';font-size:18px;font-weight:700;margin-bottom:4px;}
.login-desc{font-size:13px;color:var(--muted);margin-bottom:24px;}
.fl{margin-bottom:16px;}
.fl label{display:block;font-size:11px;font-weight:600;color:var(--ink2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.fi{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--ink);font-size:14px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--orange);}
.fi::placeholder{color:var(--muted);}
.login-btn{width:100%;padding:13px;background:var(--orange);border:none;border-radius:8px;font-family:'Space Grotesk';font-size:15px;font-weight:700;color:#fff;transition:all .2s;}
.login-btn:hover{background:var(--orange2);}
.login-err{color:var(--red);font-size:12px;margin-top:10px;display:none;padding:10px 12px;background:var(--red-dim);border-radius:6px;}
.login-hint{margin-top:14px;font-size:12px;color:var(--muted);text-align:center;}
.login-hint strong{color:var(--ink2);}

/* SHELL */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.topbar-left{display:flex;align-items:center;gap:6px;}
.tb-brand{font-family:'Space Grotesk';font-size:17px;font-weight:700;color:var(--ink);}
.tb-brand span{color:var(--orange);}
.tb-co{font-size:10px;color:var(--muted);letter-spacing:.5px;}
.tb-sep{color:var(--border);font-size:16px;padding:0 4px;}
.tb-crumb{font-size:12px;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tb-user{font-size:12px;color:var(--ink2);padding:5px 12px;background:var(--bg);border-radius:20px;border:1px solid var(--border);}
.tb-role{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
.tb-role.admin{background:var(--orange-dim);color:var(--orange);}
.tb-role.staff{background:var(--blue-dim);color:var(--blue);}
.tb-logout{width:32px;height:32px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.tb-logout:hover{border-color:var(--red);color:var(--red);}
.tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 16px;flex-shrink:0;overflow-x:auto;gap:2px;}
.tabs::-webkit-scrollbar{height:0;}
.tab{padding:13px 14px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;letter-spacing:.2px;transition:color .2s;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab:hover{color:var(--ink2);}
.content{flex:1;overflow-y:auto;padding:18px;}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Space Grotesk';font-weight:600;font-size:14px;color:var(--ink);}
.card-body{padding:18px;}

/* STATS */
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);}
.stat-icon{font-size:20px;margin-bottom:6px;}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.stat-value{font-family:'Space Grotesk';font-size:26px;font-weight:700;line-height:1;}
.stat-value.ora{color:var(--orange);}
.stat-value.grn{color:var(--green);}
.stat-value.red{color:var(--red);}
.stat-value.blu{color:var(--blue);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;border:none;transition:all .2s;cursor:pointer;letter-spacing:.2px;white-space:nowrap;}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:var(--orange2);}
.btn-ghost{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(249,115,22,0.2);}
.btn-ghost:hover{background:var(--orange-mid);}
.btn-red{background:var(--red-dim);color:var(--red);}
.btn-red:hover{background:rgba(239,68,68,0.18);}
.btn-green{background:var(--green-dim);color:var(--green);}
.btn-green:hover{background:rgba(16,185,129,0.18);}
.btn-blue{background:var(--blue-dim);color:var(--blue);}
.btn-blue:hover{background:rgba(59,130,246,0.18);}
.btn-amber{background:var(--amber-dim);color:var(--amber);}
.btn-amber:hover{background:rgba(245,158,11,0.18);}
.btn-purple{background:var(--purple-dim);color:var(--purple);}
.btn-purple:hover{background:rgba(139,92,246,0.18);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-xs{padding:4px 9px;font-size:10px;border-radius:6px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px;}
.badge-grn{background:var(--green-dim);color:var(--green);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-ora{background:var(--orange-dim);color:var(--orange);}
.badge-blu{background:var(--blue-dim);color:var(--blue);}
.badge-grey{background:#F3F4F6;color:var(--muted);}
.badge-amb{background:var(--amber-dim);color:var(--amber);}
.badge-pur{background:var(--purple-dim);color:var(--purple);}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);background:#F9FAFB;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--ink2);}
.tbl td strong{color:var(--ink);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#FAFAFA;}

/* FORMS */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.frow1{margin-bottom:12px;}
.flabel{display:block;font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;}
.finput,.fselect,.ftextarea{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--ink);font-size:13px;outline:none;transition:border-color .2s;}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--orange);background:var(--white);}
.finput::placeholder{color:var(--muted);}
.ftextarea{resize:vertical;min-height:70px;}
.fhint{font-size:11px;color:var(--muted);margin-top:4px;}
.fsec{font-family:'Space Grotesk';font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:580px;margin:auto;transform:translateY(16px);transition:transform .2s;box-shadow:0 20px 60px rgba(0,0,0,0.12);}
.overlay.open .modal{transform:translateY(0);}
.modal-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink);}
.modal-x{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:2px;line-height:1;transition:color .2s;}
.modal-x:hover{color:var(--red);}
.modal-body{padding:20px;max-height:72vh;overflow-y:auto;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* PROPERTY + ROOM CARDS */
.prop-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.prop-card:hover{border-color:rgba(249,115,22,0.4);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.prop-card-head{background:linear-gradient(135deg,var(--orange),#FB923C);padding:16px 18px;}
.prop-card-name{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#fff;}
.prop-card-addr{font-size:11px;color:rgba(255,255,255,0.8);margin-top:3px;}
.prop-card-body{padding:14px 18px;}
.prop-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.prop-stat:last-child{border-bottom:none;}
.prop-stat-label{font-size:11px;color:var(--muted);}
.prop-stat-value{font-size:13px;font-weight:600;color:var(--ink);}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.room-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.room-card:hover{border-color:var(--orange);box-shadow:0 4px 16px rgba(249,115,22,0.12);}
.room-type{font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--ink);margin-bottom:2px;}
.room-rent{font-size:13px;color:var(--orange);font-weight:600;margin-bottom:6px;}
.room-tenant{font-size:12px;color:var(--ink2);}

/* ELEC CALC */
.ecalc{background:#FFF7ED;border:1.5px solid var(--orange);border-radius:var(--r);padding:14px;margin:10px 0;display:none;}
.ecalc.show{display:block;}
.ecalc-title{font-family:'Space Grotesk';font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.ecalc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(249,115,22,0.1);font-size:13px;}
.ecalc-row:last-child{border-bottom:none;}
.ecalc-row span:first-child{color:var(--muted);}
.ecalc-row span:last-child{font-weight:600;color:var(--ink);}
.ecalc-total{background:var(--orange);color:#fff;padding:10px 14px;border-radius:8px;display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-top:8px;}

/* MISC */
.cov-bar{background:#F3F4F6;border-radius:20px;height:7px;overflow:hidden;margin-top:6px;}
.cov-fill{height:100%;border-radius:20px;transition:width .6s ease;}
.cov-fill.ok{background:var(--green);}
.cov-fill.warn{background:var(--amber);}
.cov-fill.bad{background:var(--red);}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.irow:last-child{border-bottom:none;}
.irow-label{color:var(--muted);font-size:12px;}
.irow-value{color:var(--ink);font-weight:500;}
.back{display:inline-flex;align-items:center;gap:5px;padding:7px 0;font-size:13px;font-weight:600;color:var(--orange);cursor:pointer;background:none;border:none;margin-bottom:14px;}
.back:hover{opacity:.7;}
.status-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);}
.mnav{display:flex;align-items:center;gap:8px;}
.mnav button{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--ink2);transition:all .2s;cursor:pointer;}
.mnav button:hover{border-color:var(--orange);color:var(--orange);}
.mnav span{font-family:'Space Grotesk';font-weight:600;font-size:13px;color:var(--ink);min-width:130px;text-align:center;}
.empty{text-align:center;padding:48px 20px;}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.3;}
.empty-text{font-size:14px;color:var(--muted);margin-bottom:14px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .25s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.receipt{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:22px;}
.rhead{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--orange);padding-bottom:12px;margin-bottom:14px;}
.rco{font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--orange);}
.rtitle{font-family:'Space Grotesk';font-size:17px;font-weight:700;text-align:center;color:var(--ink);letter-spacing:2px;margin-bottom:14px;}
.rrow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.rrow span:first-child{color:var(--muted);}
.rrow span:last-child{font-weight:600;color:var(--ink);}
.rtotal{background:var(--orange);color:#fff;padding:11px 14px;border-radius:8px;display:flex;justify-content:space-between;margin-top:10px;font-weight:700;font-size:14px;}
.rfooter{text-align:center;margin-top:12px;font-size:11px;color:var(--muted);}

/* TASK ITEM */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .2s;}
.task-item:last-child{border-bottom:none;}
.task-item:hover{background:#FAFAFA;}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;cursor:pointer;transition:all .2s;margin-top:1px;}
.task-check.done{border-color:var(--green);background:var(--green);}

/* PROP-DESK STYLE PLANNER / REMINDERS */
.pd-page{max-width:760px;margin:0 auto;padding-bottom:28px;}
.pd-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;}
.pd-title{font-family:'Space Grotesk';font-size:22px;font-weight:700;color:var(--ink);}
.pd-date-pill{display:inline-flex;align-items:center;gap:8px;background:#FFF7ED;border:1px solid #FED7AA;color:var(--orange2);font-weight:700;border-radius:999px;padding:8px 16px;box-shadow:0 2px 10px rgba(249,115,22,.08);}
.pd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.pd-stat{background:#F8F9FD;border:1px solid #E1E5EC;border-radius:16px;min-height:74px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 #fff,0 2px 8px rgba(20,25,40,.04);}
.pd-stat-num{font-family:'Space Grotesk';font-size:28px;line-height:1;font-weight:700;}
.pd-stat-label{font-size:10px;font-weight:800;color:#8C91A1;letter-spacing:.8px;text-transform:uppercase;margin-top:6px;text-align:center;}
.pd-composer{display:grid;grid-template-columns:1fr 84px;gap:14px;margin-bottom:12px;}
.pd-input,.pd-select{width:100%;background:#fff;border:1px solid #E1E5EC;border-radius:18px;padding:15px 18px;font-size:17px;color:var(--ink);outline:none;box-shadow:0 2px 10px rgba(20,25,40,.05);}
.pd-input:focus,.pd-select:focus{border-color:var(--orange);}
.pd-add{border:none;border-radius:18px;background:#7C3AED;color:#fff;font-size:30px;font-weight:800;box-shadow:0 8px 20px rgba(124,58,237,.22);}
.pd-controls{display:grid;grid-template-columns:90px 1fr;gap:10px 12px;align-items:center;margin-bottom:18px;}
.pd-label{font-size:14px;font-weight:800;color:#8C91A1;}
.pd-list-title{font-size:13px;font-weight:800;letter-spacing:1.8px;color:#8C91A1;text-transform:uppercase;margin:18px 0 10px;}
.pd-list{display:flex;flex-direction:column;gap:14px;}
.pd-task-card{background:#fff;border:1px solid #E8ECF0;border-radius:18px;padding:18px 16px;display:flex;align-items:flex-start;gap:14px;box-shadow:0 5px 18px rgba(20,25,40,.06);}
.pd-task-main{flex:1;min-width:0;}
.pd-task-title{font-size:17px;font-weight:800;color:#171923;line-height:1.35;}
.pd-task-note{font-size:13px;color:#8C91A1;margin-top:4px;line-height:1.4;}
.pd-pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;}
.pd-pill{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:999px;padding:6px 13px;font-size:12px;font-weight:800;white-space:nowrap;}
.pd-pill-purple{background:#F1E8FF;color:#6D3CCB;}
.pd-pill-blue{background:#EAF2FF;color:#2563EB;}
.pd-pill-green{background:#E9FAF3;color:#0F9F6E;}
.pd-pill-red{background:#FEECEC;color:#DC2626;}
.pd-pill-amber{background:#FFF7DD;color:#B45309;}
.pd-x{background:transparent;border:none;color:#9CA3AF;font-size:28px;line-height:1;padding:0 2px;}
.pd-check{width:34px;height:34px;border-radius:11px;border:2px solid #E1E5EC;background:#fff;color:#fff;flex-shrink:0;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.pd-check.done{border-color:var(--green);background:var(--green);}
.pd-rem-card{background:#fff;border:1px solid #E8ECF0;border-radius:20px;padding:20px 18px;display:grid;grid-template-columns:72px 1fr;gap:16px;box-shadow:0 5px 18px rgba(20,25,40,.06);}
.pd-date-icon{width:56px;height:56px;border-radius:16px;background:#F1F5FF;border:1px solid #E6ECF7;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;color:#1F2937;overflow:hidden;}
.pd-date-icon span{display:block;width:100%;background:#EF4444;color:#fff;font-size:10px;text-align:center;padding:2px 0;margin-top:-4px;margin-bottom:3px;}
.pd-rem-title{font-size:18px;font-weight:800;color:#171923;margin-bottom:3px;}
.pd-rem-note{font-size:15px;color:#4B5563;margin-bottom:5px;}
.pd-rem-date{font-size:13px;font-weight:800;color:#2563EB;margin-bottom:4px;}

<script>
const FB_KEY='AIzaSyBiBmFAJHTxoZAddAON94u7FQ_d-RpX2io';
const FB_URL=`https://firestore.googleapis.com/v1/projects/propdesk-f50e0/databases/(default)/documents/rentdesk/main?key=${FB_KEY}`;
const DOCS_BASE=`https://firestore.googleapis.com/v1/projects/propdesk-f50e0/databases/(default)/documents/rentdesk_docs`;
const ADMIN='280190',STAFF='admin123';
const DOC_TYPES=[
  {key:'lease_deed',label:'Lease Deed / Agreement',icon:'📋',required:true},
  {key:'aadhaar',label:'Aadhaar Card',icon:'🪪',required:true},
  {key:'pan',label:'PAN Card',icon:'💳',required:true},
  {key:'office_id',label:'Office / Employment ID',icon:'🏢',required:false},
  {key:'police_ver',label:'Police Verification',icon:'🚔',required:false},
];

let S={properties:[],expenses:[],cash:[],tasks:[],reminders:[]};
let user=null,isAdmin=false,curTab='dash',vProp=null,vRoom=null,saveT=null;
let billMo=mk(),expMo=mk();

// ── UTILS ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function mk(d){const dt=d||new Date();return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');}
function ml(k){if(!k)return'—';const[y,m]=k.split('-');return new Date(y,m-1).toLocaleString('en-IN',{month:'long',year:'numeric'});}
function fd(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fm(n){return'₹'+Number(n||0).toLocaleString('en-IN');}
function h(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function today(){return new Date().toISOString().split('T')[0];}
function dl(s){if(!s)return null;return Math.ceil((new Date(s)-new Date())/86400000);}
function toast(msg,dur=2600){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function openM(ti,bo,fo=''){document.getElementById('mTitle').textContent=ti;document.getElementById('mBody').innerHTML=bo;document.getElementById('mFoot').innerHTML=fo;document.getElementById('ov').classList.add('open');}
function closeM(){document.getElementById('ov').classList.remove('open');}
function ovClick(e){if(e.target.id==='ov')closeM();}
function hasDocEntry(d){return !!(d&&(d.name||d.link));}
function docCompleteness(r){const docs=r.docs||{};const mr=DOC_TYPES.filter(d=>d.required&&!hasDocEntry(docs[d.key]));return{uploaded:DOC_TYPES.filter(d=>hasDocEntry(docs[d.key])).length,missingRequired:mr.length,total:DOC_TYPES.length};}

// ── AUTH ──
function doLogin(){
  const pass=document.getElementById('lPass').value.trim();
  if(!pass){toast('Enter your password');return;}
  if(pass!==ADMIN&&pass!==STAFF){document.getElementById('lErr').style.display='block';return;}
  user=pass===ADMIN?'KD Taneja':'Preeti';
  isAdmin=(pass===ADMIN);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  document.getElementById('tbUser').textContent=user;
  const tr=document.getElementById('tbRole');tr.textContent=isAdmin?'Admin':'Staff';tr.className='tb-role '+(isAdmin?'admin':'staff');
  loadData();
}
function doLogout(){user=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('lPass').value='';document.getElementById('lErr').style.display='none';}

// ── FIREBASE ──
async function loadData(){
  let firebaseLoaded=false;
  try{
    const r=await fetch(FB_URL);
    if(r.ok){
      const d=await r.json();
      if(d.fields?.data){
        const parsed=JSON.parse(d.fields.data.stringValue);
        if(parsed){S={...S,...parsed};firebaseLoaded=true;}
      }
    }
  }catch(e){}
  // If Firebase failed, try localStorage backup
  if(!firebaseLoaded){
    try{
      const backup=localStorage.getItem('rentdesk_backup');
      const backupTime=localStorage.getItem('rentdesk_backup_time');
      if(backup){
        const parsed=JSON.parse(backup);
        if(parsed){
          S={...S,...parsed};
          const mins=Math.round((Date.now()-Number(backupTime))/60000);
          toast('⚠️ Loaded local backup ('+mins+'m ago) — check connection',5000);
        }
      }else{
        toast('⚠️ Could not reach server — starting fresh',4000);
      }
    }catch(e){}
  }
  if(!S.properties)S.properties=[];
  if(!S.expenses)S.expenses=[];
  if(!S.cash)S.cash=[];
  if(!S.tasks)S.tasks=[];
  if(!S.reminders)S.reminders=[];
  renderTab();
  // Safe poll — only syncs if no local edits in last 30s
  setInterval(async()=>{
    if(saveT)return;
    if(window._lastEdit&&Date.now()-window._lastEdit<30000)return;
    try{
      const r=await fetch(FB_URL);
      if(r.ok){
        const d=await r.json();
        if(d.fields?.data){
          const remote=JSON.parse(d.fields.data.stringValue);
          if(!remote)return;
          // Only accept if remote has at least as much data
          const lc=(S.properties?.length||0)+(S.expenses?.length||0)+(S.cash?.length||0);
          const rc=(remote.properties?.length||0)+(remote.expenses?.length||0)+(remote.cash?.length||0);
          if(rc>=lc){S={...S,...remote};if(!S.properties)S.properties=[];if(!S.expenses)S.expenses=[];if(!S.cash)S.cash=[];if(!S.tasks)S.tasks=[];if(!S.reminders)S.reminders=[];renderTab();}
        }
      }
    }catch(e){}
  },20000);
}
function setSaveIndicator(state){
  const el=document.getElementById('saveIndicator');
  if(!el)return;
  if(state==='saving'){el.textContent='💾 Saving...';el.style.color='var(--muted)';}
  else if(state==='saved'){el.textContent='✓ Saved';el.style.color='var(--green)';setTimeout(()=>{if(el.textContent==='✓ Saved')el.textContent='';},3000);}
  else if(state==='error'){el.textContent='⚠️ Save failed';el.style.color='var(--red)';}
}
async function save(){
  setSaveIndicator('saving');
  // Always save to localStorage as instant backup
  try{localStorage.setItem('rentdesk_backup',JSON.stringify(S));localStorage.setItem('rentdesk_backup_time',Date.now());}catch(e){}
  try{
    const r=await fetch(FB_URL+'&updateMask.fieldPaths=data',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{data:{stringValue:JSON.stringify(S)}}})});
    if(r.ok){setSaveIndicator('saved');}
    else{setSaveIndicator('error');console.log('Save failed:',r.status);}
  }catch(e){setSaveIndicator('error');console.log('Save error:',e);}
}
function sched(){window._lastEdit=Date.now();clearTimeout(saveT);saveT=setTimeout(save,900);}

// Firebase docs storage
async function saveDocToFS(roomId,docKey,base64Data,fileName,mimeType){
  const url=DOCS_BASE+'/'+roomId+'_'+docKey+'?key='+FB_KEY;
  try{const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{data:{stringValue:base64Data},name:{stringValue:fileName},mimeType:{stringValue:mimeType},uploadedAt:{stringValue:new Date().toISOString()}}})});return r.ok;}catch(e){return false;}
}
async function loadDocFromFS(roomId,docKey){
  const url=DOCS_BASE+'/'+roomId+'_'+docKey+'?key='+FB_KEY;
  try{const r=await fetch(url);if(!r.ok)return null;const d=await r.json();if(!d.fields)return null;return{data:d.fields.data?.stringValue,name:d.fields.name?.stringValue,mimeType:d.fields.mimeType?.stringValue,uploadedAt:d.fields.uploadedAt?.stringValue};}catch(e){return null;}
}
async function deleteDocFromFS(roomId,docKey){
  try{await fetch(DOCS_BASE+'/'+roomId+'_'+docKey+'?key='+FB_KEY,{method:'DELETE'});}catch(e){}
}

function goTab(tab){curTab=tab;vProp=null;vRoom=null;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['dash','props','billing','expenses','cash','planner','reminders'][i]===tab));renderTab();}
function renderTab(){document.getElementById('crumb').textContent='';if(vRoom){renderRoomDetail();return;}if(vProp){renderPropDetail();return;}({dash:renderDash,props:renderProps,billing:renderBilling,expenses:renderExp,cash:renderCash,planner:renderPlanner,reminders:renderReminders}[curTab]||renderDash)();}

function renderDash(){
  if(!isAdmin){renderStaffDash();return;}
  const mc=document.getElementById('mc');
  const all=[];S.properties.forEach(p=>(p.rooms||[]).forEach(r=>all.push({p,r})));
  const occ=all.filter(({r})=>r.tenant?.name).length;
  const roll=all.filter(({r})=>r.tenant?.name).reduce((s,{r})=>s+Number(r.rent||0),0);
  const cm=mk();
  const coll=all.reduce((s,{r})=>s+(r.payments||[]).filter(x=>x.month===cm).reduce((ps,x)=>ps+Number(x.amount||0),0),0);
  const totalExp=(S.expenses||[]).filter(e=>e.month===cm).reduce((s,e)=>s+(e.items||[]).reduce((is,i)=>is+Number(i.amount||0),0),0);
  let elecColl=0,mainBill=0;
  S.properties.forEach(p=>{(p.rooms||[]).forEach(r=>{const rd=(r.electricityReadings||[]).find(x=>x.month===cm);if(rd)elecColl+=Number(rd.amount||0);});const mm=(p.mainMeter||[]).find(x=>x.month===cm);if(mm)mainBill+=Number(mm.bill||0);});
  const pct=mainBill>0?Math.min(100,Math.round(elecColl/mainBill*100)):null;
  const expiring=[];

  const cashSpent=(S.cash||[]).filter(x=>x.type==='spent').reduce((s,x)=>s+Number(x.amount||0),0);

  mc.innerHTML=`
  <div style="margin-bottom:18px;">
    <div style="font-family:'Space Grotesk';font-size:18px;font-weight:700;">Good day, ${user} 👋</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px;">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
  </div>
  <div class="g4" style="margin-bottom:14px;">
    <div class="stat"><div class="stat-icon">🏢</div><div class="stat-label">Properties</div><div class="stat-value ora">${S.properties.length}</div><div class="stat-sub">${all.length} units</div></div>
    <div class="stat"><div class="stat-icon">✅</div><div class="stat-label">Occupied</div><div class="stat-value grn">${occ}</div><div class="stat-sub">${all.length-occ} vacant</div></div>
    <div class="stat"><div class="stat-icon">💰</div><div class="stat-label">Rent Roll</div><div class="stat-value ora">${fm(roll)}</div><div class="stat-sub">Monthly</div></div>
    <div class="stat"><div class="stat-icon">📥</div><div class="stat-label">Collected</div><div class="stat-value grn">${fm(coll)}</div><div class="stat-sub">${roll-coll>0?fm(roll-coll)+' pending':'All clear ✓'}</div></div>
  </div>
  <div class="g4" style="margin-bottom:14px;">
    <div class="stat"><div class="stat-icon">💸</div><div class="stat-label">Cash in Hand</div><div class="stat-value ${cashGiven-cashSpent>=0?'grn':'red'}">${fm(cashGiven-cashSpent)}</div><div class="stat-sub">With Preeti</div></div>
    <div class="stat"><div class="stat-icon">✅</div><div class="stat-label">Open Tasks</div><div class="stat-value ${openTasks>0?'ora':'grn'}" style="cursor:pointer;" onclick="goTab('planner')">${openTasks}</div><div class="stat-sub">${openTasks>0?'Tap to view':'All done!'}</div></div>
    <div class="stat"><div class="stat-icon">🔔</div><div class="stat-label">Overdue Reminders</div><div class="stat-value ${overdueRem>0?'red':'grn'}" style="cursor:pointer;" onclick="goTab('reminders')">${overdueRem}</div><div class="stat-sub">${overdueRem>0?'Action needed':'All clear'}</div></div>
    <div class="stat"><div class="stat-icon">📋</div><div class="stat-label">Expenses</div><div class="stat-value" style="color:var(--amber)">${fm(totalExp)}</div><div class="stat-sub">${ml(cm)}</div></div>
  </div>
  <div class="g2" style="margin-bottom:14px;">
    <div class="card">
      <div class="card-head"><div class="card-title">⚡ Electricity Coverage — ${ml(cm)}</div></div>
      <div class="card-body">
        ${mainBill>0?`
        <div class="irow"><span class="irow-label">Main Meter Bill</span><span class="irow-value" style="color:var(--red)">${fm(mainBill)}</span></div>
        <div class="irow"><span class="irow-label">Collected from Tenants</span><span class="irow-value" style="color:var(--green)">${fm(elecColl)}</span></div>
        <div class="irow"><span class="irow-label">${elecColl>=mainBill?'✅ Surplus':'⚠️ Shortfall'}</span><span class="irow-value" style="color:${elecColl>=mainBill?'var(--green)':'var(--red)'};">${fm(Math.abs(elecColl-mainBill))}</span></div>
        <div class="cov-bar" style="margin-top:10px;"><div class="cov-fill ${pct>=100?'ok':pct>=75?'warn':'bad'}" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:5px;text-align:right;">${pct}% covered</div>
        `:`<div style="text-align:center;color:var(--muted);padding:16px 0;font-size:13px;">No main meter for ${ml(cm)}</div>`}

    <div class="card">
      <div class="card-head"><div class="card-title">📊 ${ml(cm)} Summary</div></div>

}

  mc.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;"><div style="font-family:'Space Grotesk';font-size:18px;font-weight:700;">Properties (${S.properties.length})</div><button class="btn btn-orange" onclick="openAddProp()">+ Add Property</button></div><div class="g3">${S.properties.map(p=>{const rooms=p.rooms||[];const occ=rooms.filter(r=>r.tenant?.name).length;return`<div class="prop-card" onclick="goProp('${p.id}')"><div class="prop-card-head"><div class="prop-card-name">${h(p.name)}</div><div class="prop-card-addr">${h(p.address||'—')}</div></div><div class="prop-card-body"><div class="prop-stat"><span class="prop-stat-label">Total Units</span><span class="prop-stat-value">${rooms.length}</span></div><div class="prop-stat"><span class="prop-stat-label">Occupied</span><span class="prop-stat-value" style="color:var(--green)">${occ}</span></div><div class="prop-stat"><span class="prop-stat-label">Vacant</span><span class="prop-stat-value" style="color:var(--amber)">${rooms.length-occ}</span></div><div class="prop-stat"><span class="prop-stat-label">Rent Roll</span><span class="prop-stat-value">${fm(rooms.filter(r=>r.tenant?.name).reduce((s,r)=>s+Number(r.rent||0),0))}</span></div></div></div>`;}).join('')}</div>`;
}
function openAddProp(){openM('Add Property',`<div class="frow1"><label class="flabel">Property Name *</label><input class="finput" id="pN" placeholder="e.g. Sector 56 Building"/></div><div class="frow1"><label class="flabel">Address</label><input class="finput" id="pA" placeholder="Full address"/></div><div class="frow1"><label class="flabel">Default Electricity Rate (₹/unit)</label><input class="finput" id="pR" type="number" placeholder="8.50"/></div>`,`<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-orange" onclick="saveProp()">Save</button>`);}
function saveProp(){const n=document.getElementById('pN').value.trim();if(!n){toast('❌ Name required');return;}S.properties.push({id:uid(),name:n,address:document.getElementById('pA').value.trim(),electricityRate:document.getElementById('pR').value,rooms:[],mainMeter:[]});sched();closeM();renderProps();toast('✅ Property added');}
function goProp(id){vProp=id;renderPropDetail();}

// ── PROP DETAIL ──

  document.getElementById('crumb').textContent='› '+p.name;
  const mc=document.getElementById('mc'),rooms=p.rooms||[],occ=rooms.filter(r=>r.tenant?.name).length,cm=mk();

  mc.innerHTML=`
  <button class="back" onclick="backProps()">← Properties</button>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
    <div><div style="font-family:'Space Grotesk';font-size:20px;font-weight:700;">${h(p.name)}</div><div style="font-size:12px;color:var(--muted);">${h(p.address||'')}${p.electricityRate?' · ₹'+p.electricityRate+'/unit':''}</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn btn-ghost btn-sm" onclick="editProp('${p.id}')">✏️ Edit</button><button class="btn btn-blue btn-sm" onclick="openMainMeter('${p.id}')">⚡ Main Meter</button><button class="btn btn-orange btn-sm" onclick="openAddRoom('${p.id}')">+ Add Unit</button></div>
  </div>
  ${curMain?`<div class="status-bar"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;"><span style="font-size:11px;color:var(--muted);">⚡ Main Meter — ${ml(cm)}</span><div style="display:flex;gap:16px;flex-wrap:wrap;"><span style="font-size:12px;">Prev: <strong>${curMain.oldReading}</strong></span><span style="font-size:12px;">New: <strong>${curMain.reading}</strong></span><span style="font-size:12px;">Units: <strong style="color:var(--blue)">${curMain.units}</strong></span><span style="font-size:12px;">Bill: <strong style="color:var(--orange)">${fm(curMain.bill)}</strong></span></div></div></div>`:''}
  <div class="g4" style="margin-bottom:18px;"><div class="stat"><div class="stat-label">Total Units</div><div class="stat-value">${rooms.length}</div></div><div class="stat"><div class="stat-label">Occupied</div><div class="stat-value grn">${occ}</div></div><div class="stat"><div class="stat-label">Vacant</div><div class="stat-value" style="color:var(--amber)">${rooms.length-occ}</div></div><div class="stat"><div class="stat-label">Rent Roll</div><div class="stat-value ora">${fm(rooms.filter(r=>r.tenant?.name).reduce((s,r)=>s+Number(r.rent||0),0))}</div></div></div>
  ${rooms.length?`<div class="room-grid">${rooms.map(r=>roomCardH(r,p.id)).join('')}</div>`:`<div class="empty"><div class="empty-icon">🚪</div><div class="empty-text">No units yet</div><button class="btn btn-orange" onclick="openAddRoom('${p.id}')">Add Unit</button></div>`}`;
}
function roomCardH(r,pid){
  const ht=!!r.tenant?.name,d=r.lease?.endDate?dl(r.lease.endDate):null;
  const alert=d!==null&&d<=30?`<div style="font-size:11px;color:var(--red);margin-top:4px;">⚠️ ${d<=0?'Lease expired':d+'d left'}</div>`:'';
  const dc=ht?docCompleteness(r):{missingRequired:0,uploaded:0};
  const docBadge=ht?(dc.missingRequired>0?`<div style="font-size:11px;color:var(--red);margin-top:4px;font-weight:600;">🔴 ${dc.missingRequired} doc${dc.missingRequired>1?'s':''} missing</div>`:`<div style="font-size:11px;color:var(--green);margin-top:4px;">✅ Docs complete</div>`):'';
  return`<div class="room-card" onclick="goRoom('${pid}','${r.id}')"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;"><div class="room-type">${h(r.type)}${r.unitNo?' #'+h(r.unitNo):''}</div><span class="badge ${ht?'badge-grn':'badge-amb'}">${ht?'Occupied':'Vacant'}</span></div><div class="room-rent">${fm(r.rent)}/mo</div><div class="room-tenant">${ht?'👤 '+h(r.tenant.name):'No tenant'}</div>${r.balance>0?`<div style="font-size:11px;color:var(--red);margin-top:4px;font-weight:600;">Bal: ${fm(r.balance)}</div>`:''}${docBadge}${alert}</div>`;
}
function backProps(){vProp=null;vRoom=null;renderProps();}
function editProp(id){
  const p=S.properties.find(x=>x.id===id);
  openM('Edit Property',`<div class="frow1"><label class="flabel">Name *</label><input class="finput" id="pN" value="${p.name}"/></div><div class="frow1"><label class="flabel">Address</label><input class="finput" id="pA" value="${p.address||''}"/></div><div class="frow1"><label class="flabel">Rate (₹/unit)</label><input class="finput" id="pR" type="number" value="${p.electricityRate||''}"/></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button>${isAdmin?`<button class="btn btn-red btn-sm" onclick="delProp('${id}')">🗑</button>`:''}<button class="btn btn-orange" onclick="updProp('${id}')">Update</button>`);
}
function updProp(id){const p=S.properties.find(x=>x.id===id);p.name=document.getElementById('pN').value.trim();p.address=document.getElementById('pA').value.trim();p.electricityRate=document.getElementById('pR').value;sched();closeM();renderPropDetail();toast('✅ Updated');}
function delProp(id){if(!confirm('Delete property and all data?'))return;S.properties=S.properties.filter(x=>x.id!==id);sched();vProp=null;closeM();renderProps();toast('🗑 Deleted');}

// ── MAIN METER ──
function openMainMeter(pid){
  const p=S.properties.find(x=>x.id===pid);
  const readings=(p.mainMeter||[]).slice().sort((a,b)=>a.month.localeCompare(b.month));
  const last=readings[readings.length-1],cm=mk(),cur=readings.find(x=>x.month===cm);
  openM('⚡ Main Meter — '+p.name,`
  <div class="frow"><div><label class="flabel">Month</label><input class="finput" id="mmM" type="month" value="${cm}" oninput="mmCalc()"/></div><div><label class="flabel">Rate per Unit (₹)</label><input class="finput" id="mmR" type="number" value="${cur?.rate||p.electricityRate||''}" placeholder="8.50" oninput="mmCalc()"/></div></div>
  <div class="frow">
    <div><label class="flabel">Previous Reading</label><input class="finput" id="mmO" type="number" value="${cur?.oldReading??last?.reading??''}" oninput="mmCalc()"/><div class="fhint">${last?'📌 From '+ml(last.month)+': '+last.reading+' units':'No previous reading'}</div></div>
    <div><label class="flabel">Current Reading *</label><input class="finput" id="mmN" type="number" value="${cur?.reading||''}" placeholder="Enter new reading" oninput="mmCalc()"/></div>
  </div>
  <div class="ecalc" id="mmBox"><div class="ecalc-title">📊 Main Meter Calculation</div><div class="ecalc-row"><span>Previous</span><span id="mm1">—</span></div><div class="ecalc-row"><span>Current</span><span id="mm2">—</span></div><div class="ecalc-row"><span>Units</span><span id="mm3" style="color:var(--blue)">—</span></div><div class="ecalc-row"><span>Rate</span><span id="mm4">—</span></div><div class="ecalc-total"><span>Building Bill</span><span id="mm5">—</span></div></div>
  <div class="frow1" style="margin-top:10px;"><label class="flabel">Manual Override (₹) <span style="color:var(--muted);font-weight:400;text-transform:none;">optional</span></label><input class="finput" id="mmA" type="number" value="${cur?.bill||''}" placeholder="Leave blank = auto-calculated"/></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-orange" onclick="saveMainMeter('${pid}')">Save</button>`);
  setTimeout(mmCalc,80);
}
function mmCalc(){const o=Number(document.getElementById('mmO')?.value||0),n=Number(document.getElementById('mmN')?.value||0),r=Number(document.getElementById('mmR')?.value||0),box=document.getElementById('mmBox');if(!box)return;if(n>0&&r>0){const u=n-o,t=u*r;box.classList.add('show');document.getElementById('mm1').textContent=o+' units';document.getElementById('mm2').textContent=n+' units';document.getElementById('mm3').textContent=u+' units';document.getElementById('mm4').textContent='₹'+r+'/unit';document.getElementById('mm5').textContent=fm(t);}else box.classList.remove('show');}
function saveMainMeter(pid){
  const n=document.getElementById('mmN').value;if(!n){toast('❌ Enter reading');return;}
  const p=S.properties.find(x=>x.id===pid);if(!p.mainMeter)p.mainMeter=[];
  const mo=document.getElementById('mmM').value,o=Number(document.getElementById('mmO').value||0),nR=Number(n),r=Number(document.getElementById('mmR').value||0),u=nR-o,man=document.getElementById('mmA').value;
  p.mainMeter=p.mainMeter.filter(x=>x.month!==mo);p.mainMeter.push({month:mo,oldReading:o,reading:nR,units:u,rate:r,bill:man?Number(man):u*r});p.electricityRate=document.getElementById('mmR').value;
  sched();closeM();renderPropDetail();toast('✅ Main meter saved');
}

function collectRoom(ex={}){

    notes:document.getElementById('rNt').value.trim(),

    lease:{startDate:document.getElementById('lS').value,endDate:document.getElementById('lE').value,tenure:document.getElementById('lTen').value,lockIn:document.getElementById('lLock').value,escalation:document.getElementById('lEc').value,noticePeriod:document.getElementById('lN').value,noticeServed:document.getElementById('lNS').value}

function saveRoom(pid){if(!document.getElementById('rR').value){toast('❌ Rent required');return;}const p=S.properties.find(x=>x.id===pid);p.rooms.push(collectRoom({id:uid(),electricityReadings:[],payments:[],balance:0}));sched();closeM();renderPropDetail();toast('✅ Room added');}

// ── ELECTRICITY ──
function openElec(pid,rid){
  const p=S.properties.find(x=>x.id===pid),r=(p?.rooms||[]).find(x=>x.id===rid);
  const readings=(r.electricityReadings||[]).slice().sort((a,b)=>a.month.localeCompare(b.month));
  const last=readings[readings.length-1],cm=mk(),cur=readings.find(x=>x.month===cm);
  openM('⚡ Electricity — '+r.type+(r.unitNo?' #'+r.unitNo:''),`
  <div class="frow"><div><label class="flabel">Month</label><input class="finput" id="eM" type="month" value="${cm}" oninput="eCalc()"/></div><div><label class="flabel">Rate per Unit (₹) *</label><input class="finput" id="eRt" type="number" value="${cur?.rate||p.electricityRate||''}" placeholder="8.50" oninput="eCalc()"/></div></div>
  <div class="frow">
    <div><label class="flabel">Previous Reading</label><input class="finput" id="eO" type="number" value="${cur?.oldReading??last?.reading??''}" oninput="eCalc()"/><div class="fhint">${last?'📌 Auto: '+ml(last.month)+' → '+last.reading+' units':'First reading'}</div></div>
    <div><label class="flabel">Current Reading *</label><input class="finput" id="eN" type="number" value="${cur?.reading||''}" placeholder="New meter reading" oninput="eCalc()"/></div>
  </div>
  <div class="ecalc" id="eBox"><div class="ecalc-title">⚡ Bill Calculation</div><div class="ecalc-row"><span>Previous Reading</span><span id="e1">—</span></div><div class="ecalc-row"><span>Current Reading</span><span id="e2">—</span></div><div class="ecalc-row"><span>Units Consumed</span><span id="e3" style="color:var(--blue)">—</span></div><div class="ecalc-row"><span>Rate per Unit</span><span id="e4">—</span></div><div class="ecalc-total"><span>Total Bill</span><span id="e5">—</span></div></div>
  <div class="frow1" style="margin-top:10px;"><label class="flabel">Manual Override <span style="color:var(--muted);font-weight:400;text-transform:none;">— leave blank for auto</span></label><input class="finput" id="eA" type="number" value="${cur?.manualAmt||''}" placeholder="Auto-calculated"/></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-blue" onclick="openElecBill('${pid}','${rid}','${cm}')">📄 View Bill</button><button class="btn btn-orange" onclick="saveElec('${pid}','${rid}')">💾 Save</button>`);
  setTimeout(eCalc,80);
}
function eCalc(){const o=Number(document.getElementById('eO')?.value||0),n=Number(document.getElementById('eN')?.value||0),r=Number(document.getElementById('eRt')?.value||0),box=document.getElementById('eBox');if(!box)return;if(n>0&&r>0){const u=n-o,t=u*r;box.classList.add('show');document.getElementById('e1').textContent=o+' units';document.getElementById('e2').textContent=n+' units';document.getElementById('e3').textContent=u+' units';document.getElementById('e4').textContent='₹'+r+'/unit';document.getElementById('e5').textContent=fm(t);}else box.classList.remove('show');}
function saveElec(pid,rid){
  const n=document.getElementById('eN').value,rt=document.getElementById('eRt').value;
  if(!n){toast('❌ Enter current reading');return;}if(!rt){toast('❌ Enter rate');return;}
  const p=S.properties.find(x=>x.id===pid),r=(p?.rooms||[]).find(x=>x.id===rid);
  if(!r.electricityReadings)r.electricityReadings=[];p.electricityRate=rt;
  const mo=document.getElementById('eM').value,o=Number(document.getElementById('eO').value||0),nR=Number(n),rtN=Number(rt),u=nR-o,man=document.getElementById('eA').value;
  r.electricityReadings=r.electricityReadings.filter(x=>x.month!==mo);
  r.electricityReadings.push({month:mo,oldReading:o,reading:nR,units:u,rate:rtN,amount:man?Number(man):u*rtN,manualAmt:man?Number(man):null});
  sched();closeM();if(vRoom)renderRoomDetail();else renderBilling();toast('✅ Reading saved');
}

// ── WHATSAPP ──
function waElec(phone,name,prop,unit,month,oldR,newR,units,rate,amt){
  const msg=encodeURIComponent(`Dear ${name},\n\n⚡ *Electricity Bill — ${ml(month)}*\nProperty: ${prop} | Unit: ${unit}\n\nPrevious Reading : ${oldR} units\nNew Reading      : ${newR} units\nUnits Consumed   : ${units} units\nRate             : ₹${rate}/unit\n\n*Total Bill: ₹${Number(amt).toLocaleString('en-IN')}*\n\nKindly pay at the earliest.`);
  window.open(`https://wa.me/91${phone}?text=${msg}`,'_blank');
}
function waCombinedBill(phone,name,prop,unit,month,rent,elec,bal,total,eOld,eNew,eUnits,eRate){
  const hasElec=Number(elec)>0;

  const msg=encodeURIComponent(`Dear ${name},\n\n📄 *Monthly Bill — ${ml(month)}*\nProperty: ${prop} | Unit: ${unit}\n\n🏠 Monthly Rent : ₹${Number(rent).toLocaleString('en-IN')}${elecBlock}${balLine}\n\n*Total Due: ₹${Number(total).toLocaleString('en-IN')}*\n\nKindly pay at the earliest.`);
  window.open(`https://wa.me/91${phone}?text=${msg}`,'_blank');

function waReceipt(phone,name,prop,unit,month,amt){

function savePayment(pid,rid){
  const a=document.getElementById('pyA').value;if(!a){toast('❌ Enter amount');return;}
  const p=S.properties.find(x=>x.id===pid),r=(p?.rooms||[]).find(x=>x.id===rid);

  const mo=document.getElementById('pyM').value;
  r.payments.push({id:uid(),month:mo,amount:Number(a),mode:document.getElementById('pyMd').value,date:document.getElementById('pyD').value,notes:document.getElementById('pyNote')?.value||''});
  const elec=(r.electricityReadings||[]).find(x=>x.month===mo),bal=r.balance||0;

function syncExpenseCash(exp){
  if(!exp||exp.fromCash||exp.addedBy!=='Preeti')return;
  if(!S.cash)S.cash=[];
  const total=(exp.items||[]).reduce((s,i)=>s+Number(i.amount||0),0);
  if(total<=0){removeExpenseCash(exp);return;}
  const pLabel=exp.propertyId?(S.properties.find(x=>x.id===exp.propertyId)?.name||'Unknown'):'Other / General';
  const existing=S.cash.find(x=>(exp.linkedCashId&&x.id===exp.linkedCashId)||x.expenseId===exp.id);
  exp.linkedCashId=existing?.id||exp.linkedCashId||uid();
  const entry={id:exp.linkedCashId,type:'spent',date:exp.date,amount:total,propertyId:exp.propertyId,propertyLabel:pLabel,note:(exp.items||[]).map(i=>i.desc).filter(Boolean).join(', ')||'Expense',by:exp.addedBy,fromExpense:true,expenseId:exp.id};
  const idx=S.cash.findIndex(x=>x.id===exp.linkedCashId);
  if(idx>=0)S.cash[idx]=entry;else S.cash.push(entry);
}
function removeExpenseCash(exp){
  if(!exp)return;
  S.cash=(S.cash||[]).filter(x=>x.id!==exp.linkedCashId&&x.expenseId!==exp.id);
}

    <div class="pd-head"><div><div class="pd-title">Planner</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">K.D Constructions</div></div><div class="pd-date-pill">${new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}</div></div>
    ${pdStats(open,done,'Done',done.length)}
    <div class="pd-composer"><input class="pd-input" id="qTaskTitle" placeholder="Add a task..." onkeydown="if(event.key==='Enter')saveQuickTask()"/><button class="pd-add" onclick="saveQuickTask()">+</button></div>
    <div class="pd-controls">
      <div class="pd-label">For date:</div><input class="pd-select" type="date" id="qTaskDue" value="${today()}"/>
      <div class="pd-label">Assign to:</div><select class="pd-select" id="qTaskAssign"><option value="${user}">Myself</option><option value="All">All Staff</option><option value="Preeti">Preeti</option></select>
    </div>
    <div class="pd-list-title">Open Tasks</div>
    <div class="pd-list">${open.length?open.map(t=>taskRowH(t)).join(''):`<div class="pd-empty">No open tasks</div>`}</div>
    ${done.length?`<div class="pd-list-title">Completed</div><div class="pd-list">${done.map(t=>taskRowH(t)).join('')}</div>`:''}
  </div>`;
}
function saveQuickTask(){
  const title=document.getElementById('qTaskTitle')?.value.trim();
  if(!title){toast('❌ Enter task title');return;}
  if(!S.tasks)S.tasks=[];
  S.tasks.push({id:uid(),title,note:'',assignedTo:document.getElementById('qTaskAssign').value,dueDate:document.getElementById('qTaskDue').value,priority:'medium',property:'',status:'open',createdBy:user,createdAt:today()});
  sched();renderPlanner();toast('✅ Task added');
}
function taskRowH(t){
  const isDone=t.status==='done',overdue=t.dueDate&&dl(t.dueDate)<0&&!isDone;
  const dueBadge=t.dueDate?`<span class="pd-pill ${overdue?'pd-pill-red':t.dueDate===today()?'pd-pill-amber':'pd-pill-blue'}">${overdue?'Overdue':t.dueDate===today()?'Today':fd(t.dueDate)}</span>`:'';
  const pri=t.priority==='high'?'<span class="pd-pill pd-pill-red">Hot</span>':t.priority==='low'?'<span class="pd-pill pd-pill-purple">Low</span>':'<span class="pd-pill pd-pill-purple">Manual</span>';
  return`<div class="pd-task-card" style="${isDone?'opacity:.58':''}">
    <button class="pd-check ${isDone?'done':''}" onclick="toggleTask('${t.id}')">${isDone?'✓':''}</button>
    <div class="pd-task-main">
      <div class="pd-task-title" style="${isDone?'text-decoration:line-through;color:var(--muted)':''}">${h(t.title)}</div>
      ${t.note?`<div class="pd-task-note">${h(t.note)}</div>`:''}
      <div class="pd-pill-row"><span class="pd-pill pd-pill-blue">${h(t.assignedTo||'All')}</span>${dueBadge}${pri}${t.property?`<span class="pd-pill pd-pill-purple">${h(t.property)}</span>`:''}</div>
    </div>
    ${isAdmin&&!isDone?`<button class="pd-x" onclick="delTask('${t.id}')">×</button>`:''}
  </div>`;
}
function toggleTask(id){const t=(S.tasks||[]).find(x=>x.id===id);if(!t)return;t.status=t.status==='done'?'open':'done';t.completedAt=t.status==='done'?today():null;t.completedBy=t.status==='done'?user:null;sched();renderPlanner();toast(t.status==='done'?'✅ Task completed!':'↩️ Reopened');}
function openAddTask(){
  const propOpts=`<option value="">-- No specific property --</option>`+S.properties.map(p=>`<option value="${h(p.name)}">${h(p.name)}</option>`).join('');
  openM('+ New Task',`
  <div class="frow1"><label class="flabel">Task Title *</label><input class="finput" id="tTitle" placeholder="What needs to be done?"/></div>
  <div class="frow1"><label class="flabel">Note / Details</label><textarea class="ftextarea" id="tNote" placeholder="Additional details..." style="min-height:60px;"></textarea></div>
  <div class="frow"><div><label class="flabel">Assign To</label><select class="fselect" id="tAssign"><option value="All">All Staff</option><option value="Preeti">Preeti</option><option value="${user}">${user} (me)</option></select></div><div><label class="flabel">Due Date</label><input class="finput" type="date" id="tDue"/></div></div>
  <div class="frow"><div><label class="flabel">Priority</label><select class="fselect" id="tPri"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">⚪ Low</option></select></div><div><label class="flabel">Property (optional)</label><select class="fselect" id="tProp">${propOpts}</select></div></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-orange" onclick="saveTask()">Add Task</button>`);
}
function saveTask(){
  const title=document.getElementById('tTitle').value.trim();if(!title){toast('❌ Enter task title');return;}
  if(!S.tasks)S.tasks=[];
  S.tasks.push({id:uid(),title,note:document.getElementById('tNote').value.trim(),assignedTo:document.getElementById('tAssign').value,dueDate:document.getElementById('tDue').value,priority:document.getElementById('tPri').value,property:document.getElementById('tProp').value,status:'open',createdBy:user,createdAt:today()});
  sched();closeM();renderPlanner();toast('✅ Task added');
}
function delTask(id){if(!confirm('Delete task?'))return;S.tasks=(S.tasks||[]).filter(x=>x.id!==id);sched();renderPlanner();toast('🗑 Deleted');}

// ── REMINDERS ──
function renderReminders(){
  curTab='reminders';
  const mc=document.getElementById('mc');
  if(!S.reminders)S.reminders=[];
  const mine=isAdmin?S.reminders:S.reminders.filter(r=>r.assignedTo===user||r.assignedTo==='All');
  const active=mine.filter(r=>!r.done).sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
  const done=mine.filter(r=>r.done).slice(0,10);
  mc.innerHTML=`
  <div class="pd-page">
    <div class="pd-head"><div><div class="pd-title">Reminders</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">K.D Constructions</div></div><button class="btn btn-orange" style="border-radius:999px;padding:11px 20px;" onclick="openAddReminder()">+ Add</button></div>
    ${pdStats(active,done,'Done',done.length)}
    <div class="pd-list-title">Reminders</div>
    <div class="pd-list">${active.length?active.map(r=>reminderRowH(r)).join(''):`<div class="pd-empty">No active reminders</div>`}</div>
    ${done.length?`<div class="pd-list-title">Done</div><div class="pd-list">${done.map(r=>reminderRowH(r)).join('')}</div>`:''}
  </div>`;
}
function remMonth(d){return d?new Date(d).toLocaleString('en-IN',{month:'short'}):'Due';}
function remDay(d){return d?new Date(d).getDate():'--';}
function reminderRowH(r){
  const d=r.dueDate?dl(r.dueDate):null,overdue=d!==null&&d<0&&!r.done;
  const dateText=r.dueDate?(d===0?'Today':d===1?'Tomorrow':fd(r.dueDate)):'No date';
  return`<div class="pd-rem-card" style="${r.done?'opacity:.58':''}">
    <div class="pd-date-icon"><span>${h(remMonth(r.dueDate))}</span>${h(remDay(r.dueDate))}</div>
    <div>
      <div class="pd-rem-title" style="${overdue?'color:var(--red)':''}">${h(r.title)}</div>
      ${r.note?`<div class="pd-rem-note">${h(r.note)}</div>`:''}
      <div class="pd-rem-date">${dateText} ${overdue?'• Overdue':''}</div>
      <div class="pd-rem-meta">${r.done?'Completed':'Assigned to '+h(r.assignedTo||'All')}</div>
      <div class="pd-pill-row">
        <button class="pd-pill pd-pill-green" onclick="doneReminder('${r.id}')">✅ ${r.done?'Reopen':'Done'}</button>
        ${!r.done?`<button class="pd-pill pd-pill-blue" onclick="snoozeReminder('${r.id}')">⏰ Snooze</button>`:''}
        ${r.dueDate?`<button class="pd-pill pd-pill-purple" onclick="googleReminder('${r.id}')">📅 Google</button>`:''}
        ${isAdmin?`<button class="pd-pill pd-pill-purple" onclick="openEditReminder('${r.id}')">✏️ Edit</button><button class="pd-pill pd-pill-red" onclick="delReminder('${r.id}')">×</button>`:''}
      </div>
    </div>
  </div>`;
}
function doneReminder(id){const r=(S.reminders||[]).find(x=>x.id===id);if(!r)return;r.done=!r.done;r.doneAt=r.done?today():null;r.doneBy=r.done?user:null;sched();renderReminders();toast(r.done?'✅ Done!':'↩️ Reopened');}
function snoozeReminder(id){const r=(S.reminders||[]).find(x=>x.id===id);if(!r)return;const dt=r.dueDate?new Date(r.dueDate):new Date();dt.setDate(dt.getDate()+1);r.dueDate=dt.toISOString().split('T')[0];sched();renderReminders();toast('⏰ Snoozed to '+fd(r.dueDate));}
function googleReminder(id){const r=(S.reminders||[]).find(x=>x.id===id);if(!r?.dueDate)return;const d=r.dueDate.replaceAll('-','');window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(r.title)}&details=${encodeURIComponent(r.note||'')}&dates=${d}/${d}`,'_blank');}
function openEditReminder(id){
  const r=(S.reminders||[]).find(x=>x.id===id);if(!r)return;
  openM('Edit Reminder',`
  <div class="frow1"><label class="flabel">Reminder Title *</label><input class="finput" id="rTitle" value="${h(r.title)}"/></div>
  <div class="frow1"><label class="flabel">Note</label><textarea class="ftextarea" id="rNote" style="min-height:60px;">${h(r.note||'')}</textarea></div>
  <div class="frow"><div><label class="flabel">Assign To</label><select class="fselect" id="rAssign"><option value="All" ${r.assignedTo==='All'?'selected':''}>All Staff</option><option value="Preeti" ${r.assignedTo==='Preeti'?'selected':''}>Preeti</option><option value="${user}" ${r.assignedTo===user?'selected':''}>${user} (me)</option></select></div><div><label class="flabel">Due Date *</label><input class="finput" type="date" id="rDue" value="${r.dueDate||''}"/></div></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-orange" onclick="saveReminderEdit('${id}')">Update</button>`);
}
function openAddReminder(){
  openM('+ New Reminder',`
  <div class="frow1"><label class="flabel">Reminder Title *</label><input class="finput" id="rTitle" placeholder="e.g. Collect rent from tenant X"/></div>
  <div class="frow1"><label class="flabel">Note</label><textarea class="ftextarea" id="rNote" placeholder="Additional details..." style="min-height:60px;"></textarea></div>
  <div class="frow"><div><label class="flabel">Assign To</label><select class="fselect" id="rAssign"><option value="All">All Staff</option><option value="Preeti">Preeti</option><option value="${user}">${user} (me)</option></select></div><div><label class="flabel">Due Date *</label><input class="finput" type="date" id="rDue" value="${today()}"/></div></div>`,
  `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-orange" onclick="saveReminder()">Add Reminder</button>`);
}
function saveReminder(){
  const title=document.getElementById('rTitle').value.trim();if(!title){toast('❌ Enter title');return;}
  if(!S.reminders)S.reminders=[];
  S.reminders.push({id:uid(),title,note:document.getElementById('rNote').value.trim(),assignedTo:document.getElementById('rAssign').value,dueDate:document.getElementById('rDue').value,done:false,createdBy:user,createdAt:today()});
  sched();closeM();renderReminders();toast('✅ Reminder added');
}
function saveReminderEdit(id){
  const r=(S.reminders||[]).find(x=>x.id===id);if(!r)return;
  const title=document.getElementById('rTitle').value.trim();if(!title){toast('❌ Enter title');return;}
  r.title=title;r.note=document.getElementById('rNote').value.trim();r.assignedTo=document.getElementById('rAssign').value;r.dueDate=document.getElementById('rDue').value;r.updatedBy=user;r.updatedAt=new Date().toISOString();
  sched();closeM();renderReminders();toast('✅ Updated');
}
function delReminder(id){if(!confirm('Delete?'))return;S.reminders=(S.reminders||[]).filter(x=>x.id!==id);sched();renderReminders();toast('🗑 Deleted');}

// ── DOCUMENTS ──
function openDocs(pid,rid){
  const p=S.properties.find(x=>x.id===pid),r=(p?.rooms||[]).find(x=>x.id===rid);
  if(!r)return;
  const docs=r.docs||{};
  const rows=DOC_TYPES.map(dt=>{
    const up=docs[dt.key],hasEntry=hasDocEntry(up),link=up?.link||'';
    return`<div style="padding:14px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;">${dt.icon}</span>
          <div>
            <div style="font-size:13px;font-weight:600;">${dt.label} ${dt.required?'<span style="color:var(--red);font-size:10px;">*Required</span>':''}</div>
            ${hasEntry?`<div style="font-size:11px;color:var(--green);">✓ ${up.name?up.name+' · '+((up.size||0)/1024).toFixed(0)+'KB':'Google Drive link added'}</div>`:`<div style="font-size:11px;color:${dt.required?'var(--red)':'var(--muted)'};">${dt.required?'⚠️ Missing':'Not uploaded'}</div>`}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
          ${hasEntry?`<button class="btn btn-green btn-xs" onclick="viewDoc('${rid}','${dt.key}')">👁 View</button><button class="btn btn-red btn-xs" onclick="delDoc('${pid}','${rid}','${dt.key}')">🗑</button>`:''}
          <label for="docFileInput" class="btn btn-orange btn-xs" style="cursor:pointer;" onclick="setDocTarget('${pid}','${rid}','${dt.key}')">${up?.name?'🔄 Replace':'📤 Upload'}</label>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;">
        <input class="finput" id="docLink_${dt.key}" value="${h(link)}" placeholder="Paste Google Drive link" style="padding:7px 10px;font-size:12px;"/>
        <button class="btn btn-blue btn-xs" onclick="saveDocLink('${pid}','${rid}','${dt.key}')">Save Link</button>
      </div>
    </div>`;
  }).join('');
  openM('📎 Documents — '+(r.tenant?.name||r.type),`<div style="font-size:12px;color:var(--muted);padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:14px;">Upload PDF or image. Max 700KB per file, or paste a Google Drive link.</div>${rows}`,`<button class="btn btn-orange" onclick="closeM()">Done</button>`);
}
function setDocTarget(pid,rid,docKey){window._docPid=pid;window._docRid=rid;window._docKey=docKey;document.getElementById('docFileInput').value='';}
async function handleDocUpload(event){
  const pid=window._docPid,rid=window._docRid,docKey=window._docKey;
  if(!pid||!rid||!docKey)return;
  const file=event.target.files[0];if(!file)return;
  if(file.size>700*1024){toast('❌ File too large — keep under 700KB');return;}
  toast('⏳ Uploading '+file.name+'...',10000);
  const reader=new FileReader();
  reader.onload=async function(e){
    const ok=await saveDocToFS(rid,docKey,e.target.result,file.name,file.type);
    if(ok){
      const p=S.properties.find(x=>x.id===pid),r=(p?.rooms||[]).find(x=>x.id===rid);
      if(!r.docs)r.docs={};
      const prev=r.docs[docKey]||{};
      r.docs[docKey]={...prev,name:file.name,size:file.size,mimeType:file.type,uploadedAt:new Date().toISOString()};
      sched();toast('✅ '+file.name+' uploaded!');openDocs(pid,rid);if(vRoom)renderRoomDetail();
    }else{toast('❌ Upload failed. Check connection.');}
  };
  reader.onerror=()=>toast('❌ Could not read file');
  reader.readAsDataURL(file);
}
async function viewDoc(roomId,docKey){
  let meta=null;
  S.properties.forEach(p=>(p.rooms||[]).forEach(r=>{if(r.id===roomId)meta=r.docs?.[docKey];}));
  if(meta?.link){window.open(meta.link,'_blank');toast('✅ Link opened');return;}
  toast('⏳ Loading...',5000);
  const doc=await loadDocFromFS(roomId,docKey);
  if(!doc?.data){toast('❌ Document not found');return;}
  const w=window.open('','_blank');
  if(doc.mimeType?.startsWith('image/')){w.document.write(`<html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="${doc.data}" style="max-width:100%;max-height:100vh;object-fit:contain;"/></body></html>`);}
  else{w.location.href=doc.data;}
  toast('✅ Document opened');
}
function saveDocLink(pid,rid,docKey){
  const link=document.getElementById('docLink_'+docKey)?.value.trim();
  if(!link){toast('❌ Paste a Google Drive link');return;}
  if(!/^https?:\/\//i.test(link)){toast('❌ Link must start with http:// or https://');return;}
  const p=S.properties.find(x=>x.id===pid),r=(p?.rooms||[]).find(x=>x.id===rid);
  if(!r)return;
  if(!r.docs)r.docs={};
  r.docs[docKey]={...(r.docs[docKey]||{}),link,linkName:'Google Drive link',linkedAt:new Date().toISOString()};
  sched();toast('✅ Link saved');openDocs(pid,rid);if(vRoom)renderRoomDetail();
}
async function delDoc(pid,rid,docKey){
  if(!isAdmin){toast('❌ Only admin can delete documents');return;}
  if(!confirm('Remove document?'))return;
  await deleteDocFromFS(rid,docKey);
  const p=S.properties.find(x=>x.id===pid),r=(p?.rooms||[]).find(x=>x.id===rid);
  if(r.docs)delete r.docs[docKey];
  sched();toast('🗑 Removed');openDocs(pid,rid);if(vRoom)renderRoomDetail();
}

window.onload=()=>{
  document.getElementById('lPass').focus();
  document.getElementById('docFileInput').addEventListener('change',handleDocUpload);
  // On page close: use sendBeacon for reliable fire-and-forget save
  window.addEventListener('beforeunload',()=>{
    clearTimeout(saveT);
    // Save to localStorage immediately (synchronous)
    try{localStorage.setItem('rentdesk_backup',JSON.stringify(S));localStorage.setItem('rentdesk_backup_time',Date.now());}catch(e){}
    // Fire async save to Firebase (best effort)
    const body=JSON.stringify({fields:{data:{stringValue:JSON.stringify(S)}}});
    if(navigator.sendBeacon){
      const blob=new Blob([body],{type:'application/json'});
      navigator.sendBeacon(FB_URL+'&updateMask.fieldPaths=data',blob);
    }
  });
};
</script>
